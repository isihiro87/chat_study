<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:2600px;height:1800px;background:#fff;font-family:"Noto Sans JP",sans-serif}
.board{position:relative;width:2500px;height:1686px;overflow:hidden;background:#fdf6ea}

/* ===== 上部の紺ストライプ帯（daily側と共通の世界観） ===== */
.topband{
  position:absolute;top:0;left:0;right:0;height:250px;
  background:
    repeating-linear-gradient(-55deg, rgba(255,255,255,.06) 0 14px, transparent 14px 42px),
    linear-gradient(180deg,#16305c 0%,#1b3a6e 100%);
}
.topband::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:14px;
  background:linear-gradient(180deg,rgba(0,0,0,.18),transparent);
}

/* ===== タブ ===== */
.tab{
  position:absolute;top:36px;height:208px;border-radius:26px 26px 0 0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.tab .row{display:flex;align-items:center;gap:26px}
.tab .glyph{position:relative;width:84px;height:62px;flex:none}
.tab .glyph::before,.tab .glyph::after{
  content:"";position:absolute;border:6px solid currentColor;border-radius:10px;background:transparent;
}
.tab .glyph::before{left:0;bottom:0;width:46px;height:42px;opacity:.7}
.tab .glyph::after{right:0;top:0;width:52px;height:46px;background:currentColor}
.tab .label{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;letter-spacing:.04em}
.tab .sub{font-weight:700;letter-spacing:.14em}
.tab-daily{
  left:52px;width:1180px;top:64px;height:180px;
  background:linear-gradient(180deg,#243e63 0%,#1d3355 100%);
  color:#cfe0f5;box-shadow:inset 0 -12px 22px rgba(0,0,0,.22);
}
.tab-daily .label{font-size:88px;color:#e8f1fb}
.tab-daily .sub{font-size:40px;color:#9fc0e8;margin-top:2px}
.tab-tsuzu{
  right:52px;width:1180px;
  background:linear-gradient(180deg,#c05f10 0%,#a34a06 62%,#8a3d05 100%);
  color:#ffe9cf;box-shadow:0 18px 40px rgba(122,58,3,.45);
}
.tab-tsuzu .label{font-size:104px;color:#fff;text-shadow:0 4px 10px rgba(90,40,0,.35)}
/* アクティブタブを本文とつなげる */
.tab-tsuzu::after{
  content:"";position:absolute;left:0;right:0;bottom:-14px;height:16px;
  background:#8a3d05;
}

/* ===== 本文の飾り ===== */
.deco{position:absolute;pointer-events:none}
.deco.tri{width:0;height:0;border-left:26px solid transparent;border-right:26px solid transparent;border-bottom:44px solid rgba(180,83,9,.12)}
.deco.dot-grid{width:150px;height:110px;
  background-image:radial-gradient(rgba(180,83,9,.18) 7px, transparent 8px);
  background-size:38px 38px;
}
.deco.spark{font-size:56px;color:rgba(180,83,9,.2)}

/* ===== カードグリッド ===== */
.grid{
  position:absolute;left:0;right:0;top:250px;bottom:0;
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;
  gap:34px;padding:44px 46px 46px;
}
.card{
  position:relative;background:#fff;border-radius:30px;overflow:hidden;
  border:3px solid var(--edge);
  box-shadow:0 16px 34px rgba(120,80,30,.16), inset 0 -8px 0 rgba(0,0,0,.03);
  display:flex;align-items:center;gap:30px;padding:0 32px 0 34px;
}
.card::before{ /* 左上のストライプパッチ */
  content:"";position:absolute;top:0;left:0;width:190px;height:130px;
  background:repeating-linear-gradient(-55deg, var(--accent) 0 12px, transparent 12px 30px);
  opacity:.45;border-bottom-right-radius:36px;
}
.card::after{ /* 右下のドット */
  content:"";position:absolute;right:20px;bottom:18px;width:150px;height:96px;
  background-image:radial-gradient(var(--accent) 6px, transparent 7px);
  background-size:36px 32px;opacity:.35;
}
.card .wash{ /* うっすら色のグラデ */
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg, var(--wash) 0%, transparent 46%);
}
.card img{width:280px;height:280px;flex:none;position:relative;filter:drop-shadow(0 14px 22px rgba(90,50,10,.22))}
.card .txt{position:relative;display:flex;flex-direction:column;gap:16px;min-width:0}
.card h2{
  font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:80px;line-height:1.18;
  color:#22314f;letter-spacing:.01em;white-space:nowrap;
}
.card .bar{width:140px;height:12px;border-radius:8px;background:var(--accent)}
.card p{font-size:38px;font-weight:700;color:#5b6474;line-height:1.4;white-space:nowrap}
</style>
</head>
<body>
<div class="board">
  <div class="topband"></div>
  <div class="tab tab-daily"><div class="row"><span class="glyph"></span><span class="label">毎日クイズ</span></div><div class="sub">タップで切替 ⇄</div></div>
  <div class="tab tab-tsuzu"><div class="row"><span class="glyph"></span><span class="label">つづもん</span></div></div>

  <div class="deco tri" style="left:640px;top:300px;transform:rotate(14deg)"></div>
  <div class="deco tri" style="right:200px;top:980px;transform:rotate(-24deg);border-bottom-color:rgba(37,99,235,.1)"></div>
  <div class="deco spark" style="right:120px;top:290px">✦</div>
  <div class="deco spark" style="left:120px;top:960px">✦</div>

  <div class="grid">
    <div class="card" style="--accent:#d97706;--edge:#f3c98f;--wash:rgba(217,119,6,.10)">
      <div class="wash"></div>
      <img src="file:///C:/Users/user/projects/education-apps/marutto-study/data/line-richmenu/raw/icons/tz-ic-resume.png" alt="">
      <div class="txt"><h2>前回の<br>つづき</h2><div class="bar"></div><p>続きから再開する</p></div>
    </div>
    <div class="card" style="--accent:#2563eb;--edge:#a9c4f5;--wash:rgba(37,99,235,.08)">
      <div class="wash"></div>
      <img src="file:///C:/Users/user/projects/education-apps/marutto-study/data/line-richmenu/raw/icons/tz-ic-units.png" alt="">
      <div class="txt"><h2>単元を<br>えらぶ</h2><div class="bar"></div><p>QRがなくても開ける</p></div>
    </div>
    <div class="card" style="--accent:#16a34a;--edge:#a5dcb8;--wash:rgba(22,163,74,.08)">
      <div class="wash"></div>
      <img src="file:///C:/Users/user/projects/education-apps/marutto-study/data/line-richmenu/raw/icons/tz-ic-retry.png" alt="">
      <div class="txt"><h2>ニガテ<br>再挑戦</h2><div class="bar"></div><p>まちがえた単元から</p></div>
    </div>
    <div class="card" style="--accent:#ea580c;--edge:#f6c4a3;--wash:rgba(234,88,12,.09)">
      <div class="wash"></div>
      <img src="file:///C:/Users/user/projects/education-apps/marutto-study/data/line-richmenu/raw/icons/tz-ic-record.png" alt="">
      <div class="txt"><h2>学習の記録</h2><div class="bar"></div><p>単元ごとの到達度</p></div>
    </div>
    <div class="card" style="--accent:#0d9488;--edge:#96d8d0;--wash:rgba(13,148,136,.08)">
      <div class="wash"></div>
      <img src="file:///C:/Users/user/projects/education-apps/marutto-study/data/line-richmenu/raw/icons/tz-ic-ai.png" alt="">
      <div class="txt"><h2>AI先生の<br>使い方</h2><div class="bar"></div><p>質問・対話・<br>理解度チェック</p></div>
    </div>
    <div class="card" style="--accent:#64748b;--edge:#c3cdd9;--wash:rgba(100,116,139,.09)">
      <div class="wash"></div>
      <img src="file:///C:/Users/user/projects/education-apps/marutto-study/data/line-richmenu/raw/icons/tz-ic-help.png" alt="">
      <div class="txt"><h2>こまったら</h2><div class="bar"></div><p>つかいかた・<br>問い合わせ</p></div>
    </div>
  </div>
</div>
</body>
</html>
