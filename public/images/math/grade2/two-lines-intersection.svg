<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F5F3F0"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f2937">2直線の交点 ＝ 連立方程式の解</text>

  <!-- Graph area -->
  <rect x="70" y="32" width="260" height="210" rx="0" fill="white"/>

  <!-- Grid lines -->
  <line x1="70" y1="72" x2="330" y2="72" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="70" y1="112" x2="330" y2="112" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="70" y1="192" x2="330" y2="192" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="70" y1="232" x2="330" y2="232" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="110" y1="32" x2="110" y2="242" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="150" y1="32" x2="150" y2="242" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="230" y1="32" x2="230" y2="242" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="270" y1="32" x2="270" y2="242" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="310" y1="32" x2="310" y2="242" stroke="#F3F4F6" stroke-width="0.5"/>

  <!-- Axes: origin at (190, 152), scale 40px/unit -->
  <line x1="70" y1="152" x2="330" y2="152" stroke="#374151" stroke-width="1.5"/>
  <line x1="190" y1="32" x2="190" y2="242" stroke="#374151" stroke-width="1.5"/>

  <!-- Origin -->
  <text x="183" y="166" text-anchor="end" font-family="sans-serif" font-size="9" fill="#374151">O</text>

  <!-- X labels -->
  <text x="110" y="166" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">-2</text>
  <text x="150" y="166" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">-1</text>
  <text x="230" y="166" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">1</text>
  <text x="270" y="166" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">2</text>
  <text x="310" y="166" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">3</text>
  <text x="335" y="156" font-family="sans-serif" font-size="10" fill="#374151">x</text>

  <!-- Y labels -->
  <text x="183" y="76" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">2</text>
  <text x="183" y="116" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">1</text>
  <text x="183" y="196" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">-1</text>
  <text x="183" y="236" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">-2</text>
  <text x="194" y="30" font-family="sans-serif" font-size="10" fill="#374151">y</text>

  <!-- Line 1: y = x + 1 (red) -->
  <!-- x=-2→y=-1: (110, 192), x=0→y=1: (190, 112), x=2→y=3: (270, 32) -->
  <line x1="90" y1="212" x2="280" y2="22" stroke="#EF4444" stroke-width="2.5"/>
  <text x="285" y="30" font-family="sans-serif" font-size="9" font-weight="bold" fill="#EF4444">y = x + 1</text>

  <!-- Line 2: y = -x + 3 (blue) -->
  <!-- x=0→y=3: (190, 32), x=1→y=2: (230, 72), x=2→y=1: (270, 112), x=3→y=0: (310, 152) -->
  <line x1="150" y1="192" x2="330" y2="112" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="335" y="116" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6">y = -x + 3</text>

  <!-- Intersection point (1, 2) → (230, 72) -->
  <circle cx="230" cy="72" r="6" fill="white" stroke="#F59E0B" stroke-width="2.5"/>
  <circle cx="230" cy="72" r="3" fill="#F59E0B"/>

  <!-- Dashed lines to axes -->
  <line x1="230" y1="72" x2="230" y2="152" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="190" y1="72" x2="230" y2="72" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- Intersection label -->
  <rect x="236" y="55" width="72" height="20" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="272" y="69" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#D97706">交点(1, 2)</text>

  <!-- Key points -->
  <rect x="15" y="254" width="370" height="38" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="30" cy="267" r="4" fill="#F59E0B"/>
  <text x="40" y="271" font-family="sans-serif" font-size="8" fill="#374151">2直線の交点の座標 ＝ 連立方程式の解</text>
  <circle cx="30" cy="281" r="4" fill="#F59E0B"/>
  <text x="40" y="285" font-family="sans-serif" font-size="8" fill="#374151">x+1 = -x+3 を解くと x=1, y=2 → グラフの交点と一致！</text>
</svg>