<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F5F3F0"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f2937">y = ax² のグラフ比較</text>

  <!-- Graph area -->
  <rect x="60" y="30" width="280" height="220" rx="0" fill="white"/>

  <!-- Grid lines -->
  <line x1="60" y1="80" x2="340" y2="80" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="60" y1="130" x2="340" y2="130" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="100" y1="30" x2="100" y2="250" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="150" y1="30" x2="150" y2="250" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="250" y1="30" x2="250" y2="250" stroke="#F3F4F6" stroke-width="0.5"/>
  <line x1="300" y1="30" x2="300" y2="250" stroke="#F3F4F6" stroke-width="0.5"/>

  <!-- Axes: origin at (200, 180), scale 50px/unit -->
  <line x1="60" y1="180" x2="340" y2="180" stroke="#374151" stroke-width="1.5"/>
  <line x1="200" y1="30" x2="200" y2="250" stroke="#374151" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="193" y="190" text-anchor="end" font-family="sans-serif" font-size="9" fill="#374151">O</text>
  <text x="345" y="184" font-family="sans-serif" font-size="10" fill="#374151">x</text>
  <text x="204" y="28" font-family="sans-serif" font-size="10" fill="#374151">y</text>

  <!-- X labels -->
  <text x="100" y="194" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">-2</text>
  <text x="150" y="194" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">-1</text>
  <text x="250" y="194" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">1</text>
  <text x="300" y="194" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">2</text>

  <!-- Y labels -->
  <text x="193" y="134" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">1</text>
  <text x="193" y="84" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">2</text>
  <text x="193" y="204" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">-1</text>

  <!-- y = x² (red) - standard -->
  <!-- x=-2→y=4: (100, 180-200=-20→clip), x=-1.5→y=2.25: (125, 180-112=68), x=-1→y=1: (150, 130), x=0→y=0: (200, 180), x=1→y=1: (250, 130), x=1.5→y=2.25: (275, 68) -->
  <path d="M100,180 Q110,155 125,68 Q145,130 150,130 Q175,180 200,180 Q225,180 250,130 Q255,130 275,68 Q290,155 300,180" fill="none" stroke="#EF4444" stroke-width="0"/>
  <!-- Simpler parabola using quadratic bezier -->
  <path d="M100,20 Q150,130 155,135 Q175,175 200,180 Q225,175 245,135 Q250,130 300,20" fill="none" stroke="#EF4444" stroke-width="2.5"/>

  <!-- y = 2x² (blue) - narrower -->
  <!-- x=-1→y=2: (150, 80), x=0→y=0: (200, 180), x=1→y=2: (250, 80) -->
  <path d="M125,30 Q150,100 175,160 Q190,178 200,180 Q210,178 225,160 Q250,100 275,30" fill="none" stroke="#3B82F6" stroke-width="2"/>

  <!-- y = -x² (green) - inverted -->
  <!-- x=-2→y=-4, x=-1→y=-1: (150, 230), x=0→y=0: (200, 180), x=1→y=-1: (250, 230) -->
  <path d="M125,250 Q150,240 175,200 Q190,182 200,180 Q210,182 225,200 Q250,240 275,250" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Labels for curves -->
  <text x="310" y="40" font-family="sans-serif" font-size="9" font-weight="bold" fill="#EF4444">y = x²</text>
  <text x="280" y="55" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6">y = 2x²</text>
  <text x="280" y="248" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981">y = -x²</text>

  <!-- Key points -->
  <rect x="15" y="256" width="370" height="36" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="30" cy="268" r="4" fill="#F59E0B"/>
  <text x="40" y="272" font-family="sans-serif" font-size="8" fill="#374151">a &gt; 0 → 上に開く、a &lt; 0 → 下に開く</text>
  <circle cx="30" cy="282" r="4" fill="#F59E0B"/>
  <text x="40" y="286" font-family="sans-serif" font-size="8" fill="#374151">|a| が大きいほどグラフの開きが狭い（y = 2x² は y = x² より狭い）</text>
</svg>