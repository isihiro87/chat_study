<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <rect width="400" height="280" rx="16" fill="#F5F3F0"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f2937">√2 ってどこにある？</text>

  <!-- Number line area -->
  <rect x="20" y="70" width="360" height="100" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Number line -->
  <line x1="40" y1="110" x2="370" y2="110" stroke="#374151" stroke-width="2"/>

  <!-- Ticks and labels: 0 to 3, spacing = 100px, start at x=50 -->
  <!-- 0 -->
  <line x1="50" y1="104" x2="50" y2="116" stroke="#374151" stroke-width="1.5"/>
  <text x="50" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">0</text>

  <!-- 1 -->
  <line x1="150" y1="104" x2="150" y2="116" stroke="#374151" stroke-width="1.5"/>
  <text x="150" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">1</text>

  <!-- 2 -->
  <line x1="250" y1="104" x2="250" y2="116" stroke="#374151" stroke-width="1.5"/>
  <text x="250" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">2</text>

  <!-- 3 -->
  <line x1="350" y1="104" x2="350" y2="116" stroke="#374151" stroke-width="1.5"/>
  <text x="350" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">3</text>

  <!-- Sub-ticks between 1 and 2 -->
  <line x1="160" y1="107" x2="160" y2="113" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="160" y="147" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">1.1</text>
  <line x1="170" y1="107" x2="170" y2="113" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="170" y="147" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">1.2</text>
  <line x1="180" y1="107" x2="180" y2="113" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="180" y="147" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">1.3</text>
  <line x1="190" y1="107" x2="190" y2="113" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="190" y="147" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">1.4</text>
  <line x1="200" y1="107" x2="200" y2="113" stroke="#9CA3AF" stroke-width="0.8"/>
  <text x="200" y="147" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">1.5</text>

  <!-- √2 ≈ 1.414 → x = 150 + 41.4 ≈ 191 -->
  <circle cx="191" cy="110" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
  <circle cx="191" cy="110" r="3" fill="#EF4444"/>
  <line x1="191" y1="97" x2="191" y2="78" stroke="#EF4444" stroke-width="1.5"/>
  <rect x="160" y="72" width="62" height="20" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="191" y="86" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#DC2626">√2 ≈ 1.414</text>

  <!-- √3 ≈ 1.732 → x = 150 + 73.2 ≈ 223 -->
  <circle cx="223" cy="110" r="5" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="223" cy="110" r="2.5" fill="#3B82F6"/>
  <text x="223" y="162" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#2563EB">√3 ≈ 1.732</text>

  <!-- Square diagram for √2 -->
  <text x="90" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">面積2の正方形</text>
  <rect x="60" y="32" width="12" height="12" rx="0" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="1" transform="rotate(45, 66, 38)"/>
  <text x="90" y="62" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">一辺 = √2</text>

  <!-- Key points -->
  <rect x="15" y="180" width="370" height="90" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="200" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1f2937">平方根のポイント</text>

  <circle cx="30" cy="215" r="4" fill="#F59E0B"/>
  <text x="42" y="219" font-family="sans-serif" font-size="8" fill="#374151">√2 は「2乗すると2になる正の数」→ 1.414... と無限に続く（無理数）</text>

  <circle cx="30" cy="233" r="4" fill="#F59E0B"/>
  <text x="42" y="237" font-family="sans-serif" font-size="8" fill="#374151">√4 = 2、√9 = 3 のように整数になるものもある</text>

  <circle cx="30" cy="251" r="4" fill="#F59E0B"/>
  <text x="42" y="255" font-family="sans-serif" font-size="8" fill="#374151">2の平方根は +√2 と -√2 の2つ → ±√2 と書く</text>
</svg>