<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" fill="none">
  <!-- Background -->
  <rect width="420" height="220" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="210" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">質量保存の法則</text>

  <!-- Balance beam -->
  <rect x="140" y="105" width="140" height="4" rx="2" fill="#6B7280"/>
  <!-- Fulcrum -->
  <polygon points="210,109 195,140 225,140" fill="#9CA3AF"/>

  <!-- Left pan -->
  <rect x="60" y="85" width="100" height="35" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1D4ED8">反応前</text>
  <text x="110" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">硫酸+塩化バリウム</text>

  <!-- Right pan -->
  <rect x="260" y="85" width="100" height="35" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="310" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#059669">反応後</text>
  <text x="310" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#059669">沈殿+水溶液</text>

  <!-- Equal sign -->
  <text x="210" y="80" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#F59E0B">=</text>

  <!-- Explanation -->
  <rect x="30" y="155" width="360" height="50" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="210" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1f2937">化学変化の前後で、物質全体の質量は変わらない</text>
  <text x="210" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">原子が新しくできたり、なくなったりしないため</text>
</svg>
