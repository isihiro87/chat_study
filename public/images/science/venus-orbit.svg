<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Background -->
  <rect width="400" height="280" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">金星の見え方</text>

  <!-- Sun (center) -->
  <circle cx="200" cy="140" r="22" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <text x="200" y="144" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#D97706">太陽</text>

  <!-- Venus orbit -->
  <circle cx="200" cy="140" r="60" fill="none" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="200" y="75" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#D97706">金星の軌道</text>

  <!-- Earth orbit -->
  <circle cx="200" cy="140" r="110" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Earth -->
  <circle cx="200" cy="250" r="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="200" y="254" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1D4ED8">地球</text>

  <!-- Venus positions -->
  <!-- Morning star (west of sun, visible before sunrise) -->
  <circle cx="145" cy="115" r="9" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="145" y="118" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#D97706">A</text>

  <!-- Evening star (east of sun, visible after sunset) -->
  <circle cx="255" cy="115" r="9" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="255" y="118" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#D97706">B</text>

  <!-- Labels for A and B -->
  <rect x="20" y="95" width="95" height="35" rx="6" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1"/>
  <text x="67" y="110" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#0369A1">A: 明けの明星</text>
  <text x="67" y="122" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#0369A1">（夜明け前・東の空）</text>
  <path d="M115 112 L136 114" stroke="#7DD3FC" stroke-width="1" marker-end="url(#vArr)"/>

  <rect x="285" y="95" width="100" height="35" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="335" y="110" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#DC2626">B: よいの明星</text>
  <text x="335" y="122" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#DC2626">（日没後・西の空）</text>
  <path d="M285 112 L264 114" stroke="#FCA5A5" stroke-width="1" marker-end="url(#vArr)"/>

  <!-- Angle constraint visualization -->
  <path d="M200 250 L145 115" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="3 3"/>
  <path d="M200 250 L255 115" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="3 3"/>
  <path d="M200 250 L200 140" stroke="#6B7280" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Key insight box -->
  <rect x="50" y="175" width="130" height="22" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="115" y="190" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">太陽から大きく離れない</text>

  <!-- Bottom explanation -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5563">内惑星の金星は太陽の近くにしか見えない → 真夜中には見えない</text>

  <defs>
    <marker id="vArr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
