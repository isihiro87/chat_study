<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" fill="none">
  <!-- Background -->
  <rect width="400" height="220" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">指示薬の色変化</text>

  <!-- Table header -->
  <rect x="20" y="40" width="110" height="30" rx="4" fill="#374151"/>
  <text x="75" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">指示薬</text>

  <rect x="135" y="40" width="80" height="30" rx="4" fill="#DC2626"/>
  <text x="175" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">酸性</text>

  <rect x="220" y="40" width="80" height="30" rx="4" fill="#059669"/>
  <text x="260" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">中性</text>

  <rect x="305" y="40" width="80" height="30" rx="4" fill="#1D4ED8"/>
  <text x="345" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">アルカリ性</text>

  <!-- Row 1: Blue Litmus Paper -->
  <rect x="20" y="75" width="110" height="40" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="75" y="92" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">青色リトマス紙</text>
  <text x="75" y="106" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">（酸性で変化）</text>

  <rect x="135" y="75" width="80" height="40" rx="4" fill="#FCA5A5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="175" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991B1B">赤色</text>

  <rect x="220" y="75" width="80" height="40" rx="4" fill="#93C5FD" stroke="#E5E7EB" stroke-width="1"/>
  <text x="260" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <rect x="305" y="75" width="80" height="40" rx="4" fill="#93C5FD" stroke="#E5E7EB" stroke-width="1"/>
  <text x="345" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <!-- Row 2: Red Litmus Paper -->
  <rect x="20" y="120" width="110" height="40" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="75" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">赤色リトマス紙</text>
  <text x="75" y="151" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">（アルカリ性で変化）</text>

  <rect x="135" y="120" width="80" height="40" rx="4" fill="#FCA5A5" stroke="#E5E7EB" stroke-width="1"/>
  <text x="175" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <rect x="220" y="120" width="80" height="40" rx="4" fill="#FCA5A5" stroke="#E5E7EB" stroke-width="1"/>
  <text x="260" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <rect x="305" y="120" width="80" height="40" rx="4" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="345" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">青色</text>

  <!-- Row 3: BTB Solution -->
  <rect x="20" y="165" width="110" height="40" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="75" y="189" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">BTB溶液</text>

  <rect x="135" y="165" width="80" height="40" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="175" y="189" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#92400E">黄色</text>

  <rect x="220" y="165" width="80" height="40" rx="4" fill="#86EFAC" stroke="#22C55E" stroke-width="1.5"/>
  <text x="260" y="189" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#166534">緑色</text>

  <rect x="305" y="165" width="80" height="40" rx="4" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="345" y="189" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">青色</text>
</svg>
