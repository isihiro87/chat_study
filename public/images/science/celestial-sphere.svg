<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Background -->
  <rect width="400" height="280" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">天球と日周運動</text>

  <!-- Celestial sphere (large circle) -->
  <circle cx="200" cy="155" r="110" fill="none" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Horizon line -->
  <line x1="70" y1="185" x2="330" y2="185" stroke="#374151" stroke-width="2"/>
  <text x="55" y="189" text-anchor="end" font-family="sans-serif" font-size="9" fill="#374151">西</text>
  <text x="345" y="189" font-family="sans-serif" font-size="9" fill="#374151">東</text>

  <!-- Observer -->
  <circle cx="200" cy="175" r="6" fill="#D97706"/>
  <line x1="200" y1="175" x2="200" y2="185" stroke="#D97706" stroke-width="2"/>
  <text x="200" y="200" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#D97706">観測者</text>

  <!-- Sun's apparent path (arc above horizon) -->
  <path d="M310 185 A130 100 0 0 0 90 185" stroke="#EF4444" stroke-width="2.5" fill="none" stroke-dasharray="none"/>

  <!-- Sun positions -->
  <!-- Rising (East) -->
  <circle cx="310" cy="185" r="10" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="310" y="189" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#D97706">日出</text>

  <!-- Culmination (South, highest) -->
  <circle cx="200" cy="65" r="12" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <text x="200" y="69" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#D97706">南中</text>
  <text x="200" y="52" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">南</text>

  <!-- Setting (West) -->
  <circle cx="90" cy="185" r="10" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="90" y="189" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#D97706">日没</text>

  <!-- Direction arrows on the arc -->
  <path d="M280 110 L265 100" stroke="#EF4444" stroke-width="1.5" marker-end="url(#sArr)"/>
  <path d="M140 110 L125 120" stroke="#EF4444" stroke-width="1.5" marker-end="url(#sArr)"/>

  <!-- Earth rotation arrow (below) -->
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">太陽は東 → 南（南中） → 西 へ動いて見える</text>

  <!-- North pole label -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5563">地球が西から東へ自転 → 天体が東から西へ動いて見える（日周運動）</text>

  <!-- Below horizon label -->
  <rect x="140" y="230" width="120" height="22" rx="4" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1"/>
  <text x="200" y="245" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0369A1">地球の自転: 1日1回転</text>

  <defs>
    <marker id="sArr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#EF4444"/>
    </marker>
  </defs>
</svg>
