<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- Background -->
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">pHスケール</text>

  <!-- pH gradient bar -->
  <defs>
    <linearGradient id="phGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="15%" stop-color="#EF4444"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="45%" stop-color="#EAB308"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="65%" stop-color="#06B6D4"/>
      <stop offset="80%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <marker id="redArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#DC2626"/>
    </marker>
    <marker id="blueArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#1D4ED8"/>
    </marker>
  </defs>
  <rect x="30" y="45" width="340" height="30" rx="6" fill="url(#phGrad)"/>

  <!-- pH numbers -->
  <text x="30" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">0</text>
  <text x="53.7" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">1</text>
  <text x="77.4" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">2</text>
  <text x="101.1" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">3</text>
  <text x="124.8" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">4</text>
  <text x="148.5" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">5</text>
  <text x="172.2" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">6</text>
  <text x="200" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669">7</text>
  <text x="223.7" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">8</text>
  <text x="247.4" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">9</text>
  <text x="271.1" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">10</text>
  <text x="294.8" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">11</text>
  <text x="318.5" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">12</text>
  <text x="346" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">13</text>
  <text x="370" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">14</text>

  <!-- Labels: Acidic / Neutral / Alkaline -->
  <text x="90" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#DC2626">酸性</text>
  <text x="200" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#059669">中性</text>
  <text x="310" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">アルカリ性</text>

  <!-- Arrows -->
  <path d="M55 105 L30 105" stroke="#DC2626" stroke-width="1.5" marker-end="url(#redArr)"/>
  <text x="42" y="118" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#DC2626">強い</text>
  <path d="M345 105 L370 105" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#blueArr)"/>
  <text x="358" y="118" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1D4ED8">強い</text>

  <!-- Example substances -->
  <line x1="77" y1="42" x2="77" y2="130" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="77" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">レモン</text>
  <text x="77" y="153" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">pH2</text>

  <line x1="148" y1="42" x2="148" y2="130" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="148" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">雨水</text>
  <text x="148" y="153" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">pH5</text>

  <line x1="200" y1="42" x2="200" y2="130" stroke="#059669" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="200" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#059669">純水</text>
  <text x="200" y="153" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">pH7</text>

  <line x1="271" y1="42" x2="271" y2="130" stroke="#6B7280" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="271" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">石けん水</text>
  <text x="271" y="153" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9CA3AF">pH10</text>

  <!-- Ion labels -->
  <text x="90" y="175" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#DC2626">H+ が多い</text>
  <text x="310" y="175" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1D4ED8">OH- が多い</text>

  <!-- Bottom summary -->
  <text x="200" y="193" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5563">pH 7 より小さい → 酸性、pH 7 より大きい → アルカリ性</text>
</svg>
