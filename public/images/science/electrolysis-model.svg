<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Background -->
  <rect width="400" height="250" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">NaCl の電離イメージ</text>

  <!-- Water container -->
  <rect x="60" y="45" width="280" height="160" rx="12" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
  <text x="200" y="65" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0369A1">水溶液</text>

  <!-- NaCl molecule (center, before) -->
  <circle cx="200" cy="120" r="18" fill="#EF4444" stroke="#B91C1C" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">NaCl</text>

  <!-- Arrow left -->
  <path d="M175 120 L120 95" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- Arrow right -->
  <path d="M225 120 L280 95" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Na+ ion -->
  <circle cx="100" cy="85" r="22" fill="#3B82F6" stroke="#1D4ED8" stroke-width="2"/>
  <text x="100" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Na</text>
  <text x="100" y="95" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">+</text>

  <!-- Cl- ion -->
  <circle cx="300" cy="85" r="22" fill="#10B981" stroke="#059669" stroke-width="2"/>
  <text x="300" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Cl</text>
  <text x="300" y="95" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">-</text>

  <!-- Labels -->
  <text x="100" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1D4ED8">陽イオン</text>
  <text x="300" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669">陰イオン</text>

  <!-- Additional ions floating -->
  <circle cx="80" cy="170" r="14" fill="#3B82F6" opacity="0.6" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="80" y="174" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Na+</text>

  <circle cx="320" cy="160" r="14" fill="#10B981" opacity="0.6" stroke="#059669" stroke-width="1.5"/>
  <text x="320" y="164" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Cl-</text>

  <circle cx="150" cy="175" r="14" fill="#10B981" opacity="0.6" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="179" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Cl-</text>

  <circle cx="260" cy="180" r="14" fill="#3B82F6" opacity="0.6" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="260" y="184" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Na+</text>

  <!-- Bottom label -->
  <text x="200" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4B5563">NaCl → Na⁺ + Cl⁻（電離）</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
