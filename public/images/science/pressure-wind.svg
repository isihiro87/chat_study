<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <rect width="400" height="220" fill="#F5F3F0" rx="16"/>
  <text x="200" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">高気圧・低気圧と風の流れ</text>

  <!-- 高気圧 (Left) -->
  <circle cx="110" cy="125" r="60" fill="#3B82F6" opacity="0.12" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="110" y="130" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#3B82F6">高</text>

  <!-- 下降気流 arrow -->
  <line x1="110" y1="72" x2="110" y2="105" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="110" y="62" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3B82F6">下降気流</text>

  <!-- Clockwise outward spirals (4 curved arrows) -->
  <path d="M140,95 Q165,85 170,110" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M140,155 Q155,175 130,180" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M80,155 Q55,170 45,145" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M80,95 Q60,75 50,100" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <text x="110" y="205" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">時計回りに吹き出す</text>

  <!-- 低気圧 (Right) -->
  <circle cx="290" cy="125" r="60" fill="#EF4444" opacity="0.12" stroke="#EF4444" stroke-width="1.5"/>
  <text x="290" y="130" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#EF4444">低</text>

  <!-- 上昇気流 arrow -->
  <line x1="290" y1="105" x2="290" y2="72" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="290" y="62" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#EF4444">上昇気流</text>

  <!-- Counterclockwise inward spirals (4 curved arrows) -->
  <path d="M350,100 Q340,80 320,95" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <path d="M350,150 Q365,130 345,110" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <path d="M230,150 Q240,170 260,155" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <path d="M230,100 Q215,120 235,140" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <text x="290" y="205" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">反時計回りに吹き込む</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#EF4444"/>
    </marker>
  </defs>
</svg>