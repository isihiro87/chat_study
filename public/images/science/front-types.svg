<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#F5F3F0" rx="16"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">寒冷前線・温暖前線の断面比較</text>

  <!-- ===== Top: 寒冷前線 ===== -->
  <text x="20" y="44" font-family="sans-serif" font-size="11" font-weight="bold" fill="#3B82F6">寒冷前線</text>

  <!-- Ground line -->
  <line x1="20" y1="110" x2="380" y2="110" stroke="#9CA3AF" stroke-width="1"/>
  <text x="385" y="113" font-family="sans-serif" font-size="7" fill="#6B7280">地表</text>

  <!-- Cold air (blue) - steep wedge -->
  <path d="M20,110 L180,110 L180,70 Z" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="102" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#3B82F6">寒気</text>

  <!-- Warm air (red) - pushed up steeply -->
  <path d="M180,110 L180,70 L320,45 L380,50 L380,110 Z" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1"/>
  <text x="300" y="85" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#EF4444">暖気</text>

  <!-- Movement arrow -->
  <line x1="60" y1="115" x2="120" y2="115" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="90" y="125" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3B82F6">進行方向</text>

  <!-- Front symbol (triangles on line) -->
  <line x1="175" y1="110" x2="175" y2="65" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="175,75 180,82 170,82" fill="#3B82F6"/>

  <!-- 積乱雲 (tall cumulonimbus) -->
  <path d="M200,62 Q195,48 205,42 Q215,35 225,42 Q235,36 240,48 Q248,42 250,55 Q255,52 252,62 Z" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.8"/>
  <line x1="220" y1="62" x2="220" y2="70" stroke="#6B7280" stroke-width="0.5"/>
  <text x="225" y="38" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">積乱雲</text>

  <!-- Rain (heavy, narrow area) -->
  <line x1="210" y1="68" x2="208" y2="78" stroke="#3B82F6" stroke-width="0.8"/>
  <line x1="218" y1="70" x2="216" y2="80" stroke="#3B82F6" stroke-width="0.8"/>
  <line x1="226" y1="68" x2="224" y2="78" stroke="#3B82F6" stroke-width="0.8"/>
  <line x1="234" y1="70" x2="232" y2="80" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="340" y="62" font-family="sans-serif" font-size="8" fill="#6B7280">短時間の</text>
  <text x="340" y="72" font-family="sans-serif" font-size="8" fill="#6B7280">強い雨</text>

  <!-- ===== Bottom: 温暖前線 ===== -->
  <text x="20" y="142" font-family="sans-serif" font-size="11" font-weight="bold" fill="#EF4444">温暖前線</text>

  <!-- Ground line -->
  <line x1="20" y1="215" x2="380" y2="215" stroke="#9CA3AF" stroke-width="1"/>
  <text x="385" y="218" font-family="sans-serif" font-size="7" fill="#6B7280">地表</text>

  <!-- Cold air (blue) - ahead of front -->
  <path d="M20,215 L20,185 L200,170 L200,215 Z" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="207" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#3B82F6">寒気</text>

  <!-- Warm air (red) - gentle slope over cold air -->
  <path d="M200,215 L200,170 L20,185 L20,152 Q100,148 200,155 L380,165 L380,215 Z" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1"/>
  <text x="310" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#EF4444">暖気</text>

  <!-- Movement arrow -->
  <line x1="280" y1="220" x2="340" y2="220" stroke="#EF4444" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="310" y="230" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#EF4444">進行方向</text>

  <!-- Front symbol (semicircles on line) -->
  <line x1="195" y1="215" x2="195" y2="168" stroke="#EF4444" stroke-width="2"/>
  <circle cx="195" cy="178" r="5" fill="#EF4444"/>

  <!-- 乱層雲 (flat, wide cloud) -->
  <path d="M50,155 Q55,148 65,150 Q75,145 90,148 Q100,144 115,148 Q125,145 135,150 Q145,148 150,155 Z" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.8"/>
  <text x="100" y="143" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">乱層雲</text>

  <!-- Rain (light, wide area) -->
  <line x1="60" y1="158" x2="58" y2="168" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="75" y1="158" x2="73" y2="168" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="90" y1="157" x2="88" y2="167" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="105" y1="157" x2="103" y2="167" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="120" y1="157" x2="118" y2="167" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="135" y1="158" x2="133" y2="168" stroke="#3B82F6" stroke-width="0.6"/>
  <text x="340" y="155" font-family="sans-serif" font-size="8" fill="#6B7280">広範囲の</text>
  <text x="340" y="165" font-family="sans-serif" font-size="8" fill="#6B7280">おだやかな雨</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3B82F6"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#EF4444"/>
    </marker>
  </defs>
</svg>