<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <!-- Background -->
  <rect width="400" height="260" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">水の電気分解</text>

  <!-- H-tube container -->
  <rect x="80" y="50" width="240" height="160" rx="12" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
  <text x="200" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0369A1">うすい水酸化ナトリウム水溶液</text>

  <!-- Cathode side -->
  <rect x="100" y="85" width="80" height="100" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8">陰極(−)</text>
  <!-- Gas bubbles -->
  <circle cx="125" cy="125" r="5" fill="#93C5FD" opacity="0.6"/>
  <circle cx="140" cy="135" r="4" fill="#93C5FD" opacity="0.6"/>
  <circle cx="155" cy="120" r="6" fill="#93C5FD" opacity="0.6"/>
  <circle cx="130" cy="145" r="5" fill="#93C5FD" opacity="0.6"/>
  <text x="140" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">H&#x2082;</text>
  <text x="140" y="183" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">水素</text>

  <!-- Anode side -->
  <rect x="220" y="85" width="80" height="100" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="260" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#DC2626">陽極(+)</text>
  <!-- Gas bubbles (less) -->
  <circle cx="250" cy="130" r="4" fill="#FCA5A5" opacity="0.6"/>
  <circle cx="265" cy="140" r="3" fill="#FCA5A5" opacity="0.6"/>
  <text x="260" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#DC2626">O&#x2082;</text>
  <text x="260" y="183" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#DC2626">酸素</text>

  <!-- Volume ratio -->
  <text x="200" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f2937">体積比 → 水素 : 酸素 = 2 : 1</text>
  <text x="200" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4B5563">2H&#x2082;O → 2H&#x2082; + O&#x2082;</text>
</svg>
