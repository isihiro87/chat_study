<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Background -->
  <rect width="400" height="250" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">中和反応のしくみ</text>

  <!-- Left: Acid -->
  <rect x="20" y="50" width="100" height="120" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="70" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991B1B">塩酸 (HCl)</text>

  <!-- H+ ions -->
  <circle cx="50" cy="100" r="14" fill="#EF4444"/>
  <text x="50" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">H+</text>
  <circle cx="90" cy="100" r="14" fill="#EF4444" opacity="0.6"/>
  <text x="90" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">H+</text>

  <!-- Cl- ions -->
  <circle cx="50" cy="140" r="14" fill="#10B981"/>
  <text x="50" y="144" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">Cl-</text>
  <circle cx="90" cy="140" r="14" fill="#10B981" opacity="0.6"/>
  <text x="90" y="144" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">Cl-</text>

  <!-- Plus sign -->
  <text x="140" y="115" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#6B7280">+</text>

  <!-- Right: Alkali -->
  <rect x="160" y="50" width="100" height="120" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="210" y="72" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1E40AF">水酸化ナトリウム</text>
  <text x="210" y="84" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1E40AF">(NaOH)</text>

  <!-- Na+ ions -->
  <circle cx="190" cy="108" r="14" fill="#3B82F6"/>
  <text x="190" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">Na+</text>
  <circle cx="230" cy="108" r="14" fill="#3B82F6" opacity="0.6"/>
  <text x="230" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">Na+</text>

  <!-- OH- ions -->
  <circle cx="190" cy="145" r="14" fill="#06B6D4"/>
  <text x="190" y="149" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">OH-</text>
  <circle cx="230" cy="145" r="14" fill="#06B6D4" opacity="0.6"/>
  <text x="230" y="149" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">OH-</text>

  <!-- Arrow -->
  <path d="M270 110 L300 110" stroke="#374151" stroke-width="3" marker-end="url(#mainArr)"/>

  <!-- Result -->
  <rect x="310" y="50" width="80" height="55" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="350" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#166534">水 (H2O)</text>
  <text x="350" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#166534">H+ + OH-</text>
  <text x="350" y="100" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#166534">→ H2O</text>

  <rect x="310" y="115" width="80" height="55" rx="8" fill="#FEF3C7" stroke="#FDE68A" stroke-width="2"/>
  <text x="350" y="135" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#92400E">塩（えん）</text>
  <text x="350" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#92400E">Na+ + Cl-</text>
  <text x="350" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#92400E">→ NaCl</text>

  <!-- Bottom equation -->
  <rect x="40" y="190" width="320" height="45" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">HCl + NaOH → NaCl + H2O</text>
  <text x="200" y="226" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">（酸） + （アルカリ） → （塩） + （水）</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="mainArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#374151"/>
    </marker>
  </defs>
</svg>
