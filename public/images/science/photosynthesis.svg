<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <rect width="400" height="250" rx="16" fill="#F5F3F0"/>
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">光合成のしくみ</text>

  <!-- Leaf shape -->
  <ellipse cx="200" cy="130" rx="120" ry="70" fill="#d1fae5" stroke="#10B981" stroke-width="2"/>
  <text x="200" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669">葉（葉緑体で光合成）</text>

  <!-- Chloroplast -->
  <ellipse cx="200" cy="135" rx="40" ry="25" fill="#10B981" opacity="0.3" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="138" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">葉緑体</text>

  <!-- Sunlight input (left top) -->
  <text x="30" y="60" font-family="sans-serif" font-size="10" fill="#F59E0B" font-weight="bold">光</text>
  <line x1="45" y1="60" x2="100" y2="110" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="20" y="75" font-family="sans-serif" font-size="20" fill="#F59E0B">☀️</text>

  <!-- CO2 input (bottom left) -->
  <text x="25" y="185" font-family="sans-serif" font-size="10" fill="#6B7280" font-weight="bold">二酸化炭素</text>
  <text x="45" y="198" font-family="sans-serif" font-size="9" fill="#6B7280">(CO₂)</text>
  <line x1="80" y1="185" x2="120" y2="155" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Water input (bottom right) -->
  <text x="310" y="200" font-family="sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">水</text>
  <text x="305" y="213" font-family="sans-serif" font-size="9" fill="#3B82F6">(H₂O)</text>
  <line x1="320" y1="188" x2="280" y2="160" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Output: Starch (right top) -->
  <text x="330" y="70" font-family="sans-serif" font-size="10" fill="#10B981" font-weight="bold">デンプン</text>
  <text x="330" y="83" font-family="sans-serif" font-size="8" fill="#10B981">（養分）</text>
  <line x1="280" y1="110" x2="325" y2="75" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Output: O2 (right) -->
  <text x="340" y="130" font-family="sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">酸素</text>
  <text x="340" y="143" font-family="sans-serif" font-size="9" fill="#3B82F6">(O₂)</text>
  <line x1="285" y1="130" x2="335" y2="130" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Bottom note -->
  <text x="200" y="240" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">光 + 二酸化炭素 + 水 → デンプン + 酸素（葉緑体で行われる）</text>

  <defs>
    <marker id="arrowAmber" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#F59E0B"/>
    </marker>
    <marker id="arrowGray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6B7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#10B981"/>
    </marker>
  </defs>
</svg>
