<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="arrowCurrent" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#F59E0B"/>
    </marker>
  </defs>
  <rect width="400" height="220" rx="16" fill="#F5F3F0"/>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">直列回路と並列回路の比較</text>

  <!-- === Left: 直列回路 === -->
  <text x="100" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#3B82F6">直列回路</text>

  <!-- Battery -->
  <line x1="40" y1="60" x2="40" y2="160" stroke="#374151" stroke-width="1.5"/>
  <line x1="30" y1="100" x2="50" y2="100" stroke="#374151" stroke-width="2.5"/>
  <line x1="34" y1="108" x2="46" y2="108" stroke="#374151" stroke-width="1.2"/>
  <text x="22" y="108" font-family="sans-serif" font-size="8" fill="#6B7280">E</text>
  <text x="44" y="96" font-family="sans-serif" font-size="7" fill="#EF4444">+</text>
  <text x="44" y="116" font-family="sans-serif" font-size="7" fill="#3B82F6">-</text>

  <!-- Top wire -->
  <line x1="40" y1="60" x2="160" y2="60" stroke="#374151" stroke-width="1.5"/>
  <!-- Bottom wire -->
  <line x1="40" y1="160" x2="160" y2="160" stroke="#374151" stroke-width="1.5"/>

  <!-- R1 in series -->
  <rect x="70" y="52" width="30" height="16" rx="2" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="85" y="63" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">R₁</text>

  <!-- R2 in series -->
  <rect x="115" y="52" width="30" height="16" rx="2" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="63" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">R₂</text>

  <!-- Right vertical wire -->
  <line x1="160" y1="60" x2="160" y2="160" stroke="#374151" stroke-width="1.5"/>

  <!-- Current arrows (series) -->
  <line x1="55" y1="56" x2="68" y2="56" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arrowCurrent)"/>
  <line x1="102" y1="56" x2="113" y2="56" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arrowCurrent)"/>
  <line x1="160" y1="80" x2="160" y2="95" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arrowCurrent)"/>
  <line x1="100" y1="164" x2="75" y2="164" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arrowCurrent)"/>

  <!-- Series labels -->
  <text x="100" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">I = I₁ = I₂</text>
  <text x="100" y="198" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">V = V₁ + V₂</text>

  <!-- === Right: 並列回路 === -->
  <text x="305" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#10B981">並列回路</text>

  <!-- Battery -->
  <line x1="240" y1="60" x2="240" y2="160" stroke="#374151" stroke-width="1.5"/>
  <line x1="230" y1="100" x2="250" y2="100" stroke="#374151" stroke-width="2.5"/>
  <line x1="234" y1="108" x2="246" y2="108" stroke="#374151" stroke-width="1.2"/>
  <text x="222" y="108" font-family="sans-serif" font-size="8" fill="#6B7280">E</text>
  <text x="244" y="96" font-family="sans-serif" font-size="7" fill="#EF4444">+</text>
  <text x="244" y="116" font-family="sans-serif" font-size="7" fill="#3B82F6">-</text>

  <!-- Top wire to branch point -->
  <line x1="240" y1="60" x2="310" y2="60" stroke="#374151" stroke-width="1.5"/>
  <!-- Bottom wire to branch point -->
  <line x1="240" y1="160" x2="310" y2="160" stroke="#374151" stroke-width="1.5"/>

  <!-- Branch point left -->
  <line x1="310" y1="60" x2="310" y2="80" stroke="#374151" stroke-width="1.5"/>
  <line x1="310" y1="130" x2="310" y2="160" stroke="#374151" stroke-width="1.5"/>

  <!-- Upper branch with R1 -->
  <line x1="310" y1="80" x2="330" y2="80" stroke="#374151" stroke-width="1.5"/>
  <rect x="330" y="72" width="30" height="16" rx="2" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <text x="345" y="83" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#10B981">R₁</text>
  <line x1="360" y1="80" x2="380" y2="80" stroke="#374151" stroke-width="1.5"/>

  <!-- Lower branch with R2 -->
  <line x1="310" y1="130" x2="330" y2="130" stroke="#374151" stroke-width="1.5"/>
  <rect x="330" y="122" width="30" height="16" rx="2" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <text x="345" y="133" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#10B981">R₂</text>
  <line x1="360" y1="130" x2="380" y2="130" stroke="#374151" stroke-width="1.5"/>

  <!-- Branch point right -->
  <line x1="380" y1="80" x2="380" y2="130" stroke="#374151" stroke-width="1.5"/>

  <!-- Branch splits -->
  <line x1="310" y1="80" x2="310" y2="130" stroke="#374151" stroke-width="1.5"/>

  <!-- Current arrows (parallel) -->
  <line x1="265" y1="56" x2="280" y2="56" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arrowCurrent)"/>
  <line x1="314" y1="76" x2="328" y2="76" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arrowCurrent)"/>
  <line x1="314" y1="126" x2="328" y2="126" stroke="#F59E0B" stroke-width="1.2" marker-end="url(#arrowCurrent)"/>

  <!-- Current labels on branches -->
  <text x="345" y="70" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#F59E0B">I₁</text>
  <text x="345" y="148" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#F59E0B">I₂</text>

  <!-- Parallel labels -->
  <text x="305" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">I = I₁ + I₂</text>
  <text x="305" y="198" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">V = V₁ = V₂</text>

  <!-- Divider -->
  <line x1="200" y1="38" x2="200" y2="210" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>
</svg>