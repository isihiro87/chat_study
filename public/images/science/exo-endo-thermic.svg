<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" fill="none">
  <!-- Background -->
  <rect width="420" height="220" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="210" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">発熱反応と吸熱反応</text>

  <!-- Exothermic -->
  <rect x="20" y="45" width="180" height="155" rx="12" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="110" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#DC2626">発熱反応</text>
  <text x="110" y="88" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7F1D1D">周囲に熱を出す → 温度が上がる</text>

  <!-- Thermometer up -->
  <rect x="45" y="100" width="8" height="50" rx="4" fill="#EF4444"/>
  <circle cx="49" cy="155" r="8" fill="#EF4444"/>
  <path d="M42 110 L56 110" stroke="#EF4444" stroke-width="1.5"/>
  <text x="65" y="115" font-family="sans-serif" font-size="10" fill="#DC2626">温度UP!</text>

  <!-- Examples -->
  <text x="110" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">例:</text>
  <text x="110" y="155" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">鉄粉の酸化(化学かいろ)</text>
  <text x="110" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">ガスの燃焼</text>
  <text x="110" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">中和反応</text>

  <!-- Endothermic -->
  <rect x="220" y="45" width="180" height="155" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="310" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1D4ED8">吸熱反応</text>
  <text x="310" y="88" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1E3A5F">周囲から熱をうばう → 温度が下がる</text>

  <!-- Thermometer down -->
  <rect x="245" y="120" width="8" height="30" rx="4" fill="#3B82F6"/>
  <circle cx="249" cy="155" r="8" fill="#3B82F6"/>
  <path d="M242 130 L256 130" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="265" y="135" font-family="sans-serif" font-size="10" fill="#1D4ED8">温度DOWN!</text>

  <!-- Examples -->
  <text x="310" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">例:</text>
  <text x="310" y="155" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">水酸化バリウム+塩化アンモニウム</text>
  <text x="310" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">炭酸水素ナトリウム+クエン酸</text>

  <!-- Chemical energy note -->
  <text x="210" y="215" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">化学エネルギーの差が熱や光として現れる</text>
</svg>
