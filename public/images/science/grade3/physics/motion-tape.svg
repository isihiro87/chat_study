<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Background -->
  <rect width="400" height="250" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">記録タイマーのテープ</text>

  <!-- Uniform motion -->
  <text x="30" y="55" font-family="sans-serif" font-size="11" font-weight="bold" fill="#3B82F6">等速直線運動</text>
  <rect x="30" y="62" width="340" height="30" rx="4" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- Equal spacing dots -->
  <circle cx="55" cy="77" r="3" fill="#3B82F6"/>
  <circle cx="95" cy="77" r="3" fill="#3B82F6"/>
  <circle cx="135" cy="77" r="3" fill="#3B82F6"/>
  <circle cx="175" cy="77" r="3" fill="#3B82F6"/>
  <circle cx="215" cy="77" r="3" fill="#3B82F6"/>
  <circle cx="255" cy="77" r="3" fill="#3B82F6"/>
  <circle cx="295" cy="77" r="3" fill="#3B82F6"/>
  <circle cx="335" cy="77" r="3" fill="#3B82F6"/>
  <!-- Equal spacing arrows -->
  <path d="M55 67 L95 67" stroke="#93C5FD" stroke-width="1"/>
  <text x="75" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3B82F6">同じ間隔</text>
  <path d="M95 67 L135 67" stroke="#93C5FD" stroke-width="1"/>
  <text x="115" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3B82F6">同じ間隔</text>
  <text x="340" y="100" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">→ 速さが一定</text>

  <!-- Accelerating motion -->
  <text x="30" y="125" font-family="sans-serif" font-size="11" font-weight="bold" fill="#EF4444">だんだん速くなる運動</text>
  <rect x="30" y="132" width="340" height="30" rx="4" fill="white" stroke="#FCA5A5" stroke-width="1.5"/>
  <!-- Widening spacing dots -->
  <circle cx="45" cy="147" r="3" fill="#EF4444"/>
  <circle cx="60" cy="147" r="3" fill="#EF4444"/>
  <circle cx="82" cy="147" r="3" fill="#EF4444"/>
  <circle cx="112" cy="147" r="3" fill="#EF4444"/>
  <circle cx="152" cy="147" r="3" fill="#EF4444"/>
  <circle cx="202" cy="147" r="3" fill="#EF4444"/>
  <circle cx="262" cy="147" r="3" fill="#EF4444"/>
  <circle cx="335" cy="147" r="3" fill="#EF4444"/>
  <!-- Widening arrows -->
  <path d="M45 137 L60 137" stroke="#FCA5A5" stroke-width="1"/>
  <text x="52" y="135" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#EF4444">狭い</text>
  <path d="M262 137 L335 137" stroke="#FCA5A5" stroke-width="1"/>
  <text x="298" y="135" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#EF4444">広い</text>
  <text x="340" y="170" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">→ 間隔がだんだん広がる</text>

  <!-- Decelerating motion -->
  <text x="30" y="195" font-family="sans-serif" font-size="11" font-weight="bold" fill="#F59E0B">だんだん遅くなる運動</text>
  <rect x="30" y="202" width="340" height="30" rx="4" fill="white" stroke="#FDE68A" stroke-width="1.5"/>
  <!-- Narrowing spacing dots -->
  <circle cx="45" cy="217" r="3" fill="#D97706"/>
  <circle cx="115" cy="217" r="3" fill="#D97706"/>
  <circle cx="175" cy="217" r="3" fill="#D97706"/>
  <circle cx="225" cy="217" r="3" fill="#D97706"/>
  <circle cx="265" cy="217" r="3" fill="#D97706"/>
  <circle cx="295" cy="217" r="3" fill="#D97706"/>
  <circle cx="318" cy="217" r="3" fill="#D97706"/>
  <circle cx="335" cy="217" r="3" fill="#D97706"/>
  <text x="340" y="242" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">→ 間隔がだんだん狭くなる</text>
</svg>
