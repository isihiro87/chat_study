<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Background -->
  <rect width="400" height="280" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">力学的エネルギーの保存</text>

  <!-- Ramp / path -->
  <path d="M40 80 Q120 80 200 180 Q280 240 360 240" stroke="#9CA3AF" stroke-width="3" fill="none"/>

  <!-- Position A (top) -->
  <circle cx="60" cy="75" r="15" fill="#3B82F6"/>
  <text x="60" y="55" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1D4ED8">A (高い位置)</text>

  <!-- Position B (middle) -->
  <circle cx="200" cy="175" r="15" fill="#8B5CF6"/>
  <text x="200" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6D28D9">B (途中)</text>

  <!-- Position C (bottom) -->
  <circle cx="340" cy="235" r="15" fill="#EF4444"/>
  <text x="340" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#DC2626">C (低い位置)</text>

  <!-- Ground line -->
  <line x1="20" y1="255" x2="380" y2="255" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Height arrows -->
  <line x1="40" y1="75" x2="40" y2="255" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="25" y="170" font-family="sans-serif" font-size="9" fill="#3B82F6" transform="rotate(-90 25 170)">高さ 大</text>

  <!-- Energy bars -->
  <!-- A: high PE, low KE -->
  <rect x="55" y="90" width="12" height="40" rx="2" fill="#F59E0B" opacity="0.8"/>
  <rect x="55" y="130" width="12" height="5" rx="2" fill="#10B981" opacity="0.8"/>

  <!-- B: medium PE, medium KE -->
  <rect x="195" y="190" width="12" height="20" rx="2" fill="#F59E0B" opacity="0.8"/>
  <rect x="195" y="210" width="12" height="20" rx="2" fill="#10B981" opacity="0.8"/>

  <!-- C: low PE, high KE -->
  <rect x="335" y="245" width="12" height="2" rx="2" fill="#F59E0B" opacity="0.8"/>
  <rect x="335" y="247" width="12" height="40" rx="2" fill="#10B981" opacity="0.8"/>

  <!-- Legend -->
  <rect x="80" y="260" width="12" height="12" rx="2" fill="#F59E0B"/>
  <text x="98" y="271" font-family="sans-serif" font-size="10" fill="#374151">位置エネルギー</text>

  <rect x="200" y="260" width="12" height="12" rx="2" fill="#10B981"/>
  <text x="218" y="271" font-family="sans-serif" font-size="10" fill="#374151">運動エネルギー</text>

  <!-- Total energy label -->
  <text x="350" y="271" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">合計は一定！</text>
</svg>
