<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="150" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">原子のモデル</text>

  <!-- Electron orbit -->
  <ellipse cx="150" cy="150" rx="110" ry="50" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="5 3" transform="rotate(-30 150 150)"/>
  <ellipse cx="150" cy="150" rx="110" ry="50" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="5 3" transform="rotate(30 150 150)"/>
  <ellipse cx="150" cy="150" rx="110" ry="50" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="5 3" transform="rotate(90 150 150)"/>

  <!-- Nucleus -->
  <circle cx="150" cy="150" r="30" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>

  <!-- Protons in nucleus -->
  <circle cx="140" cy="142" r="10" fill="#EF4444"/>
  <text x="140" y="146" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">p+</text>

  <circle cx="160" cy="142" r="10" fill="#EF4444"/>
  <text x="160" y="146" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">p+</text>

  <!-- Neutrons in nucleus -->
  <circle cx="140" cy="160" r="10" fill="#9CA3AF"/>
  <text x="140" y="164" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">n</text>

  <circle cx="160" cy="160" r="10" fill="#9CA3AF"/>
  <text x="160" y="164" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">n</text>

  <!-- Electrons -->
  <circle cx="55" cy="105" r="8" fill="#3B82F6"/>
  <text x="55" y="109" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">e-</text>

  <circle cx="245" cy="195" r="8" fill="#3B82F6"/>
  <text x="245" y="199" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">e-</text>

  <!-- Labels -->
  <text x="150" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">原子核</text>

  <!-- Legend -->
  <circle cx="50" cy="250" r="7" fill="#EF4444"/>
  <text x="65" y="254" font-family="sans-serif" font-size="10" fill="#374151">陽子（+）</text>

  <circle cx="140" cy="250" r="7" fill="#9CA3AF"/>
  <text x="155" y="254" font-family="sans-serif" font-size="10" fill="#374151">中性子</text>

  <circle cx="225" cy="250" r="7" fill="#3B82F6"/>
  <text x="240" y="254" font-family="sans-serif" font-size="10" fill="#374151">電子（-）</text>

  <text x="150" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">陽子と電子の数は同じ → 電気的に中性</text>
</svg>
