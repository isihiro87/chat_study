<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- Background -->
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">リトマス紙の色変化</text>

  <!-- Table header -->
  <rect x="20" y="42" width="110" height="28" rx="4" fill="#374151"/>
  <text x="75" y="61" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">リトマス紙</text>

  <rect x="135" y="42" width="80" height="28" rx="4" fill="#DC2626"/>
  <text x="175" y="61" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">酸性</text>

  <rect x="220" y="42" width="80" height="28" rx="4" fill="#059669"/>
  <text x="260" y="61" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">中性</text>

  <rect x="305" y="42" width="80" height="28" rx="4" fill="#1D4ED8"/>
  <text x="345" y="61" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">アルカリ性</text>

  <!-- Row 1: Blue Litmus Paper -->
  <rect x="20" y="76" width="110" height="48" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="75" y="96" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">青色リトマス紙</text>
  <text x="75" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">（酸性で変化）</text>

  <rect x="135" y="76" width="80" height="48" rx="4" fill="#FCA5A5" stroke="#EF4444" stroke-width="2"/>
  <text x="175" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#991B1B">赤色に</text>
  <text x="175" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991B1B">変化！</text>

  <rect x="220" y="76" width="80" height="48" rx="4" fill="#93C5FD" stroke="#E5E7EB" stroke-width="1"/>
  <text x="260" y="104" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <rect x="305" y="76" width="80" height="48" rx="4" fill="#93C5FD" stroke="#E5E7EB" stroke-width="1"/>
  <text x="345" y="104" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <!-- Row 2: Red Litmus Paper -->
  <rect x="20" y="130" width="110" height="48" rx="4" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="75" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">赤色リトマス紙</text>
  <text x="75" y="166" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">（アルカリ性で変化）</text>

  <rect x="135" y="130" width="80" height="48" rx="4" fill="#FCA5A5" stroke="#E5E7EB" stroke-width="1"/>
  <text x="175" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <rect x="220" y="130" width="80" height="48" rx="4" fill="#FCA5A5" stroke="#E5E7EB" stroke-width="1"/>
  <text x="260" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">変化なし</text>

  <rect x="305" y="130" width="80" height="48" rx="4" fill="#93C5FD" stroke="#3B82F6" stroke-width="2"/>
  <text x="345" y="154" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E40AF">青色に</text>
  <text x="345" y="169" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1E40AF">変化！</text>

  <!-- Memory tip -->
  <text x="200" y="194" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">覚え方: 「酸っぱいもので青→赤」「アルカリで赤→青」</text>
</svg>
