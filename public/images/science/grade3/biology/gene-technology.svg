<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <rect width="400" height="260" rx="16" fill="#F5F3F0"/>
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">遺伝子組換え技術の応用</text>

  <!-- Center: Gene recombination concept -->
  <rect x="130" y="40" width="140" height="50" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="200" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1E40AF">遺伝子組換え技術</text>
  <text x="200" y="76" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">目的の遺伝子を他の生物に組み込む</text>

  <!-- Arrow left -->
  <line x1="160" y1="90" x2="100" y2="115" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <!-- Arrow right -->
  <line x1="240" y1="90" x2="300" y2="115" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrGray)"/>

  <!-- Left: Agriculture -->
  <rect x="15" y="115" width="170" height="130" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <rect x="15" y="115" width="170" height="28" rx="10" fill="#10B981"/>
  <rect x="15" y="130" width="170" height="13" fill="#10B981"/>
  <text x="100" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">農業への応用</text>

  <!-- Agriculture examples -->
  <rect x="25" y="152" width="150" height="35" rx="6" fill="#DCFCE7" stroke="#10B981" stroke-width="1"/>
  <text x="100" y="167" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">害虫に強い作物</text>
  <text x="100" y="180" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">殺虫成分の遺伝子を組み込む</text>

  <rect x="25" y="195" width="150" height="35" rx="6" fill="#DCFCE7" stroke="#10B981" stroke-width="1"/>
  <text x="100" y="210" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#059669">青いバラ</text>
  <text x="100" y="223" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">青い色素の遺伝子を導入</text>

  <!-- Right: Medicine -->
  <rect x="215" y="115" width="170" height="130" rx="10" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="215" y="115" width="170" height="28" rx="10" fill="#3B82F6"/>
  <rect x="215" y="130" width="170" height="13" fill="#3B82F6"/>
  <text x="300" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">医療への応用</text>

  <!-- Medicine examples -->
  <rect x="225" y="152" width="150" height="35" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="300" y="167" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1E40AF">インスリンの生産</text>
  <text x="300" y="180" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">ヒトの遺伝子を細菌に組み込む</text>

  <rect x="225" y="195" width="150" height="35" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1E40AF">遺伝子診断</text>
  <text x="300" y="223" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">病気のリスクを事前に調べる</text>

  <!-- Footer -->
  <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">生命倫理の問題も考える必要がある</text>

  <defs>
    <marker id="arrGray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6B7280"/>
    </marker>
  </defs>
</svg>