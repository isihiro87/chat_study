<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3B82F6">月食のしくみ</text>

  <!-- Alignment label -->
  <text x="200" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">太陽 — 地球 — 月 の順に一直線に並ぶ（満月のとき）</text>

  <!-- Sun -->
  <circle cx="55" cy="95" r="30" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <text x="55" y="92" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#D97706">太陽</text>
  <text x="55" y="104" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#D97706">（光源）</text>

  <!-- Light rays from sun -->
  <path d="M85 78 L178 85" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M85 112 L178 105" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Rays that pass above/below earth -->
  <path d="M85 65 L340 65" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>
  <path d="M85 125 L340 125" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>

  <!-- Earth (between sun and moon) -->
  <circle cx="195" cy="95" r="22" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="195" y="93" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1D4ED8">地球</text>
  <text x="195" y="104" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#1D4ED8">（観測者）</text>

  <!-- Shadow cone from earth to moon -->
  <path d="M217 85 L330 88 L330 102 L217 105 Z" fill="#374151" opacity="0.12"/>
  <text x="275" y="82" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">地球の影</text>

  <!-- Moon (in shadow) -->
  <circle cx="340" cy="95" r="14" fill="#6B7280" stroke="#4B5563" stroke-width="1.5"/>
  <text x="340" y="99" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">月</text>

  <!-- Reddish tint indicator -->
  <circle cx="340" cy="95" r="14" fill="#EF4444" opacity="0.15"/>

  <!-- Explanation -->
  <rect x="30" y="135" width="340" height="25" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="200" y="151" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">地球の影に月が入る → 月が暗くなる（赤銅色に見える）</text>

  <!-- Key point -->
  <rect x="60" y="168" width="280" height="22" rx="6" fill="#e0e7ff" stroke="#3B82F6" stroke-width="1"/>
  <text x="200" y="183" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1e40af">地球の夜側ならどこからでも観測できる（日食より広範囲）</text>
</svg>