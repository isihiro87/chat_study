<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#EF4444">日食のしくみ</text>

  <!-- Alignment label -->
  <text x="200" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">太陽 — 月 — 地球 の順に一直線に並ぶ（新月のとき）</text>

  <!-- Sun -->
  <circle cx="55" cy="95" r="30" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <text x="55" y="92" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#D97706">太陽</text>
  <text x="55" y="104" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#D97706">（光源）</text>

  <!-- Light rays from sun -->
  <path d="M85 80 L185 87" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M85 110 L185 103" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Rays that pass above/below moon -->
  <path d="M85 68 L340 68" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>
  <path d="M85 122 L340 122" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>

  <!-- Moon (between sun and earth) -->
  <circle cx="195" cy="95" r="14" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/>
  <text x="195" y="99" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="white">月</text>

  <!-- Shadow cone from moon to earth -->
  <path d="M209 88 L325 80 L325 110 L209 102 Z" fill="#374151" opacity="0.1"/>
  <text x="268" y="75" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">月の影</text>

  <!-- Earth -->
  <circle cx="340" cy="95" r="22" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="340" y="93" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1D4ED8">地球</text>
  <text x="340" y="104" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#1D4ED8">（観測者）</text>

  <!-- Small shadow dot on earth -->
  <circle cx="335" cy="95" r="4" fill="#374151" opacity="0.2"/>

  <!-- Explanation -->
  <rect x="30" y="135" width="340" height="25" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="200" y="151" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">月が太陽の前を通り、太陽の光をさえぎる → 太陽が欠けて見える</text>

  <!-- Key point -->
  <rect x="80" y="168" width="240" height="22" rx="6" fill="#fee2e2" stroke="#EF4444" stroke-width="1"/>
  <text x="200" y="183" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#991b1b">月の影が落ちた地域だけで観測できる</text>
</svg>