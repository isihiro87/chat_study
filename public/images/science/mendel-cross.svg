<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">メンデルの法則（エンドウの交配）</text>

  <!-- Parent generation -->
  <text x="200" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B7280">親の代（純系）</text>

  <!-- Parent 1: Round (AA) -->
  <circle cx="100" cy="75" r="20" fill="#10B981" stroke="#059669" stroke-width="2"/>
  <text x="100" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">AA</text>
  <text x="100" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#059669">丸い種子</text>

  <!-- X mark -->
  <text x="200" y="82" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#6B7280">x</text>

  <!-- Parent 2: Wrinkled (aa) -->
  <rect x="280" y="55" width="40" height="40" rx="8" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="300" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">aa</text>
  <text x="300" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#D97706">しわの種子</text>

  <!-- Arrow down -->
  <path d="M200 110 L200 130" stroke="#6B7280" stroke-width="2" marker-end="url(#garr2)"/>

  <!-- F1 generation -->
  <text x="200" y="148" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B7280">子の代（F1）</text>

  <circle cx="200" cy="175" r="20" fill="#10B981" stroke="#059669" stroke-width="2"/>
  <text x="200" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Aa</text>
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#059669">全部丸い（顕性形質）</text>

  <!-- Arrow down -->
  <path d="M200 210 L200 225" stroke="#6B7280" stroke-width="2" marker-end="url(#garr2)"/>
  <text x="260" y="222" font-family="sans-serif" font-size="9" fill="#6B7280">Aa x Aa</text>

  <!-- F2 generation -->
  <text x="200" y="242" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6B7280">孫の代（F2）</text>

  <!-- 3 round : 1 wrinkled -->
  <circle cx="80" cy="268" r="14" fill="#10B981" stroke="#059669" stroke-width="1.5"/>
  <text x="80" y="272" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">AA</text>

  <circle cx="150" cy="268" r="14" fill="#10B981" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="272" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">Aa</text>

  <circle cx="220" cy="268" r="14" fill="#10B981" stroke="#059669" stroke-width="1.5"/>
  <text x="220" y="272" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">Aa</text>

  <rect x="276" y="254" width="28" height="28" rx="6" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/>
  <text x="290" y="272" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">aa</text>

  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">丸 : しわ = 3 : 1</text>

  <defs>
    <marker id="garr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
