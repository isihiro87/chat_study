<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" fill="none">
  <!-- Background -->
  <rect width="420" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="210" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">化学反応式の書き方</text>

  <!-- Step 1 -->
  <rect x="20" y="45" width="380" height="35" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="30" y="62" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1D4ED8">Step1</text>
  <text x="75" y="68" font-family="sans-serif" font-size="12" fill="#1D4ED8">水素 + 酸素 → 水</text>
  <text x="250" y="68" font-family="sans-serif" font-size="9" fill="#6B7280">日本語で反応を書く</text>

  <!-- Step 2 -->
  <rect x="20" y="90" width="380" height="35" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="30" y="107" font-family="sans-serif" font-size="10" font-weight="bold" fill="#D97706">Step2</text>
  <text x="75" y="113" font-family="sans-serif" font-size="12" fill="#D97706">H₂ + O₂ → H₂O</text>
  <text x="250" y="113" font-family="sans-serif" font-size="9" fill="#6B7280">化学式に置きかえる</text>

  <!-- Step 3 -->
  <rect x="20" y="135" width="380" height="50" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="30" y="152" font-family="sans-serif" font-size="10" font-weight="bold" fill="#059669">Step3</text>
  <text x="75" y="158" font-family="sans-serif" font-size="14" font-weight="bold" fill="#059669">2H₂ + O₂ → 2H₂O</text>
  <text x="250" y="158" font-family="sans-serif" font-size="9" fill="#6B7280">原子の数を合わせる(係数)</text>
  <text x="75" y="176" font-family="sans-serif" font-size="9" fill="#059669">左辺: H=4, O=2  右辺: H=4, O=2  OK!</text>
</svg>
