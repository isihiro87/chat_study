<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#EF4444"/>
    </marker>
  </defs>
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">温暖前線</text>

  <!-- Ground line -->
  <line x1="20" y1="160" x2="380" y2="160" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="385" y="163" font-family="sans-serif" font-size="7" fill="#6B7280">地表</text>

  <!-- Cold air (blue) - ahead of front, left side -->
  <path d="M20,160 L20,125 L200,110 L200,160 Z" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="150" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#3B82F6">寒気</text>

  <!-- Warm air (red) - gentle slope riding over cold air -->
  <path d="M200,160 L200,110 L20,125 L20,95 Q120,82 200,90 L380,105 L380,160 Z" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1"/>
  <text x="310" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#EF4444">暖気</text>

  <!-- Front symbol line with semicircles -->
  <line x1="195" y1="160" x2="195" y2="108" stroke="#EF4444" stroke-width="2.5"/>
  <circle cx="195" cy="120" r="5" fill="#EF4444"/>
  <circle cx="195" cy="136" r="5" fill="#EF4444"/>

  <!-- Movement arrow -->
  <line x1="270" y1="168" x2="340" y2="168" stroke="#EF4444" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="305" y="180" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EF4444">進行方向</text>

  <!-- 乱層雲 (flat, wide layered cloud) -->
  <path d="M40,98 Q48,90 60,93 Q75,87 95,91 Q110,86 130,90 Q145,87 160,92 Q170,89 178,95 L180,98 Z" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.8"/>
  <text x="110" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">乱層雲</text>

  <!-- Higher thin cloud -->
  <path d="M50,72 Q70,67 90,70 Q110,66 130,69 Q145,66 155,72" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="160" y="68" font-family="sans-serif" font-size="7" fill="#9CA3AF">巻層雲</text>

  <!-- Rain (light, wide area) -->
  <line x1="55" y1="101" x2="53" y2="114" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="72" y1="100" x2="70" y2="113" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="89" y1="99" x2="87" y2="112" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="106" y1="98" x2="104" y2="111" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="123" y1="98" x2="121" y2="111" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="140" y1="99" x2="138" y2="112" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="157" y1="99" x2="155" y2="112" stroke="#3B82F6" stroke-width="0.6"/>
  <line x1="170" y1="100" x2="168" y2="113" stroke="#3B82F6" stroke-width="0.6"/>

  <!-- Rain description -->
  <rect x="300" y="48" width="85" height="28" rx="4" fill="white" stroke="#D1D5DB" stroke-width="0.8"/>
  <text x="342" y="61" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#374151">おだやかな雨</text>
  <text x="342" y="72" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">広い範囲に長時間</text>

  <!-- Characteristics note -->
  <text x="200" y="195" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">暖気が寒気の上にはい上がり、ゆるやかな傾斜面をつくる</text>
</svg>
