<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3B82F6"/>
    </marker>
  </defs>
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">寒冷前線</text>

  <!-- Ground line -->
  <line x1="20" y1="155" x2="380" y2="155" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="385" y="158" font-family="sans-serif" font-size="7" fill="#6B7280">地表</text>

  <!-- Cold air (blue) - steep wedge pushing from left -->
  <path d="M20,155 L200,155 L200,85 Z" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="1"/>
  <text x="90" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#3B82F6">寒気</text>

  <!-- Warm air (red) - pushed up steeply -->
  <path d="M200,155 L200,85 L340,55 L380,60 L380,155 Z" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1"/>
  <text x="320" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#EF4444">暖気</text>

  <!-- Front symbol line with triangles -->
  <line x1="195" y1="155" x2="195" y2="80" stroke="#3B82F6" stroke-width="2.5"/>
  <polygon points="195,95 201,104 189,104" fill="#3B82F6"/>
  <polygon points="195,115 201,124 189,124" fill="#3B82F6"/>

  <!-- Movement arrow -->
  <line x1="55" y1="165" x2="130" y2="165" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="92" y="178" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">進行方向</text>

  <!-- Warm air being pushed up arrows -->
  <line x1="230" y1="100" x2="220" y2="70" stroke="#EF4444" stroke-width="1" marker-end="url(#arrRed2)"/>
  <line x1="260" y1="90" x2="250" y2="60" stroke="#EF4444" stroke-width="1" marker-end="url(#arrRed2)"/>
  <defs>
    <marker id="arrRed2" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- 積乱雲 (tall cumulonimbus) -->
  <path d="M215,72 Q210,55 220,48 Q232,38 244,48 Q254,40 260,52 Q268,45 270,60 Q278,55 274,68 L270,72 Z" fill="#9CA3AF" stroke="#6B7280" stroke-width="0.8"/>
  <text x="245" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">積乱雲</text>

  <!-- Rain (heavy, narrow area) -->
  <line x1="225" y1="74" x2="222" y2="88" stroke="#3B82F6" stroke-width="1"/>
  <line x1="235" y1="73" x2="232" y2="87" stroke="#3B82F6" stroke-width="1"/>
  <line x1="245" y1="72" x2="242" y2="86" stroke="#3B82F6" stroke-width="1"/>
  <line x1="255" y1="73" x2="252" y2="87" stroke="#3B82F6" stroke-width="1"/>
  <line x1="265" y1="74" x2="262" y2="88" stroke="#3B82F6" stroke-width="1"/>

  <!-- Rain description -->
  <rect x="300" y="40" width="85" height="28" rx="4" fill="white" stroke="#D1D5DB" stroke-width="0.8"/>
  <text x="342" y="53" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#374151">短時間の強い雨</text>
  <text x="342" y="64" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">せまい範囲</text>

  <!-- Characteristics note -->
  <text x="200" y="195" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">寒気が暖気の下にもぐりこみ、暖気を急激に押し上げる</text>
</svg>
