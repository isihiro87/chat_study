<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">体循環</text>

  <!-- Left ventricle (start) -->
  <rect x="20" y="75" width="80" height="50" rx="8" fill="#fecaca" stroke="#EF4444" stroke-width="2"/>
  <text x="60" y="97" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#991b1b">左心室</text>
  <text x="60" y="112" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#991b1b">（動脈血）</text>

  <!-- Aorta arrow -->
  <line x1="100" y1="90" x2="140" y2="90" stroke="#EF4444" stroke-width="2.5" marker-end="url(#arrowRd)"/>
  <text x="120" y="82" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EF4444">大動脈</text>

  <!-- Body cells -->
  <rect x="148" y="50" width="105" height="100" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="200" y="75" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#92400e">全身の細胞</text>
  <!-- Exchange at cells -->
  <text x="200" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">O₂・栄養分を受け取る</text>
  <text x="200" y="112" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">CO₂・不要物を渡す</text>
  <text x="200" y="140" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#92400e">（物質交換）</text>

  <!-- Vena cava arrow -->
  <line x1="253" y1="90" x2="293" y2="90" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrowBl)"/>
  <text x="273" y="82" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3B82F6">大静脈</text>

  <!-- Right atrium (end) -->
  <rect x="300" y="75" width="80" height="50" rx="8" fill="#fee2e2" stroke="#EF4444" stroke-width="2"/>
  <text x="340" y="97" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#991b1b">右心房</text>
  <text x="340" y="112" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#991b1b">（静脈血）</text>

  <!-- Blood color change indicator -->
  <rect x="20" y="55" width="80" height="14" rx="3" fill="#EF4444" opacity="0.15"/>
  <text x="60" y="65" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#EF4444">動脈血（赤）</text>
  <rect x="300" y="55" width="80" height="14" rx="3" fill="#3B82F6" opacity="0.15"/>
  <text x="340" y="65" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3B82F6">静脈血（青）</text>

  <!-- Legend -->
  <line x1="30" y1="185" x2="50" y2="185" stroke="#EF4444" stroke-width="2.5"/>
  <text x="55" y="189" font-family="sans-serif" font-size="8" fill="#374151">動脈血（O₂が多い）</text>
  <line x1="210" y1="185" x2="230" y2="185" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="235" y="189" font-family="sans-serif" font-size="8" fill="#374151">静脈血（CO₂が多い）</text>

  <defs>
    <marker id="arrowRd" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#EF4444"/>
    </marker>
    <marker id="arrowBl" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#3B82F6"/>
    </marker>
  </defs>
</svg>