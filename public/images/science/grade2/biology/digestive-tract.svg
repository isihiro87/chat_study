<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280">
  <defs>
    <marker id="arrowDown" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="300" height="280" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="150" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">消化管のつくり</text>

  <!-- Mouth -->
  <rect x="105" y="40" width="90" height="28" rx="8" fill="#fca5a5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="150" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991b1b">口</text>
  <text x="210" y="56" font-family="sans-serif" font-size="8" fill="#6B7280">食物をかみくだく</text>

  <!-- Arrow -->
  <line x1="150" y1="68" x2="150" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Esophagus -->
  <rect x="115" y="84" width="70" height="24" rx="6" fill="#fed7aa" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="150" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#92400e">食道</text>
  <text x="210" y="98" font-family="sans-serif" font-size="8" fill="#6B7280">ぜん動運動で</text>
  <text x="210" y="109" font-family="sans-serif" font-size="8" fill="#6B7280">食物を送る</text>

  <!-- Arrow -->
  <line x1="150" y1="108" x2="150" y2="122" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Stomach -->
  <ellipse cx="150" cy="145" rx="45" ry="22" fill="#fca5a5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="150" y="149" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991b1b">胃</text>
  <text x="210" y="142" font-family="sans-serif" font-size="8" fill="#6B7280">胃液で消化</text>
  <text x="210" y="153" font-family="sans-serif" font-size="8" fill="#6B7280">(ペプシン)</text>

  <!-- Arrow -->
  <line x1="150" y1="167" x2="150" y2="180" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Small intestine -->
  <rect x="95" y="182" width="110" height="32" rx="12" fill="#93c5fd" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="150" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1e40af">小腸</text>
  <text x="220" y="192" font-family="sans-serif" font-size="8" fill="#6B7280">消化・吸収の</text>
  <text x="220" y="203" font-family="sans-serif" font-size="8" fill="#6B7280">中心（柔毛）</text>

  <!-- Arrow -->
  <line x1="150" y1="214" x2="150" y2="226" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Large intestine -->
  <rect x="100" y="228" width="100" height="28" rx="10" fill="#d1fae5" stroke="#10B981" stroke-width="1.5"/>
  <text x="150" y="246" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#065f46">大腸</text>
  <text x="215" y="242" font-family="sans-serif" font-size="8" fill="#6B7280">水分を吸収</text>

  <!-- Arrow -->
  <line x1="150" y1="256" x2="150" y2="264" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Anus -->
  <rect x="115" y="266" width="70" height="10" rx="4" fill="#e5e7eb" stroke="#6B7280" stroke-width="1"/>
  <text x="150" y="274" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">肛門</text>
</svg>
