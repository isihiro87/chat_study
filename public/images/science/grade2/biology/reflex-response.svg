<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" rx="16" fill="#F5F3F0"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#EF4444">反射のしくみ</text>

  <!-- Example context -->
  <text x="200" y="40" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">例：熱いものに触れたとき、無意識に手を引っ込める</text>

  <!-- Sensory organ -->
  <rect x="15" y="60" width="65" height="45" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="47" y="79" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#92400e">感覚器官</text>
  <text x="47" y="93" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#92400e">（皮膚）</text>

  <!-- Arrow: sensory organ → sensory nerve -->
  <line x1="80" y1="82" x2="108" y2="82" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmb)"/>

  <!-- Sensory nerve -->
  <rect x="115" y="65" width="55" height="35" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="142" y="86" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">感覚神経</text>

  <!-- Arrow: sensory nerve → spinal cord -->
  <line x1="170" y1="82" x2="198" y2="82" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmb)"/>

  <!-- Spinal cord (center, highlighted as decision point) -->
  <rect x="205" y="58" width="65" height="50" rx="10" fill="#fecaca" stroke="#EF4444" stroke-width="2"/>
  <text x="237" y="79" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#991b1b">せきずい</text>
  <text x="237" y="95" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#EF4444">（ここで判断！）</text>

  <!-- Arrow: spinal cord → motor nerve -->
  <line x1="270" y1="82" x2="298" y2="82" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGrn)"/>

  <!-- Motor nerve -->
  <rect x="305" y="65" width="48" height="35" rx="6" fill="#d1fae5" stroke="#10B981" stroke-width="1"/>
  <text x="329" y="86" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065f46">運動神経</text>

  <!-- Arrow: motor nerve → muscle -->
  <line x1="353" y1="82" x2="370" y2="82" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGrn)"/>

  <!-- Muscle -->
  <rect x="372" y="62" width="22" height="40" rx="6" fill="#d1fae5" stroke="#10B981" stroke-width="1.5"/>
  <text x="383" y="78" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#065f46">筋</text>
  <text x="383" y="90" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#065f46">肉</text>

  <!-- Brain shown as NOT involved (grayed out, with X) -->
  <rect x="205" y="120" width="65" height="35" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="237" y="138" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">脳</text>
  <text x="237" y="149" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">（通らない）</text>
  <!-- X mark over brain path -->
  <line x1="230" y1="108" x2="230" y2="120" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="223" y1="113" x2="237" y2="113" stroke="#EF4444" stroke-width="2"/>
  <text x="250" y="115" font-family="sans-serif" font-size="8" font-weight="bold" fill="#EF4444">×</text>

  <!-- Flow summary -->
  <rect x="20" y="163" width="360" height="28" rx="6" fill="#fee2e2" stroke="#EF4444" stroke-width="1"/>
  <text x="200" y="180" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991b1b">感覚器官 → 感覚神経 → せきずい → 運動神経 → 筋肉（脳を経由しない＝速い！）</text>

  <defs>
    <marker id="arrowAmb" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#F59E0B"/>
    </marker>
    <marker id="arrowGrn" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#10B981"/>
    </marker>
  </defs>
</svg>