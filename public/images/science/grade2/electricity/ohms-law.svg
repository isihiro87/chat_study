<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="axisArrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect width="400" height="220" rx="16" fill="#F5F3F0"/>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">オームの法則 V = R × I</text>

  <!-- Graph area -->
  <!-- Grid lines -->
  <line x1="80" y1="60" x2="260" y2="60" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="80" y1="80" x2="260" y2="80" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="80" y1="100" x2="260" y2="100" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="80" y1="120" x2="260" y2="120" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="80" y1="140" x2="260" y2="140" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="80" y1="160" x2="260" y2="160" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="120" y1="40" x2="120" y2="180" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="160" y1="40" x2="160" y2="180" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="200" y1="40" x2="200" y2="180" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="240" y1="40" x2="240" y2="180" stroke="#E5E7EB" stroke-width="0.5"/>

  <!-- Y-axis -->
  <line x1="80" y1="185" x2="80" y2="38" stroke="#374151" stroke-width="1.5" marker-end="url(#axisArrow)"/>
  <!-- X-axis -->
  <line x1="75" y1="180" x2="268" y2="180" stroke="#374151" stroke-width="1.5" marker-end="url(#axisArrow)"/>

  <!-- Axis labels -->
  <text x="170" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">電流 I [A]</text>
  <text x="60" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151" transform="rotate(-90,60,110)">電圧 V [V]</text>

  <!-- Y-axis ticks and values -->
  <text x="72" y="183" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">0</text>
  <text x="72" y="143" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">2</text>
  <text x="72" y="103" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">4</text>
  <text x="72" y="63" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">6</text>

  <!-- X-axis ticks and values -->
  <text x="120" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">0.1</text>
  <text x="160" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">0.2</text>
  <text x="200" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">0.3</text>
  <text x="240" y="193" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">0.4</text>

  <!-- Line 1: R=20Ω (blue, steeper) — V=20*I, at I=0.1 V=2, I=0.2 V=4, I=0.3 V=6 -->
  <line x1="80" y1="180" x2="240" y2="60" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="120" cy="140" r="3" fill="#3B82F6"/>
  <circle cx="160" cy="100" r="3" fill="#3B82F6"/>
  <circle cx="200" cy="60" r="3" fill="#3B82F6"/>

  <!-- Line 2: R=10Ω (green, gentler) — V=10*I, at I=0.1 V=1, I=0.2 V=2, I=0.3 V=3, I=0.4 V=4 -->
  <line x1="80" y1="180" x2="240" y2="100" stroke="#10B981" stroke-width="2"/>
  <circle cx="120" cy="160" r="3" fill="#10B981"/>
  <circle cx="160" cy="140" r="3" fill="#10B981"/>
  <circle cx="200" cy="120" r="3" fill="#10B981"/>
  <circle cx="240" cy="100" r="3" fill="#10B981"/>

  <!-- Legend -->
  <line x1="290" y1="58" x2="310" y2="58" stroke="#3B82F6" stroke-width="2"/>
  <text x="314" y="62" font-family="sans-serif" font-size="9" fill="#3B82F6">抵抗大 (R₁=20Ω)</text>
  <line x1="290" y1="78" x2="310" y2="78" stroke="#10B981" stroke-width="2"/>
  <text x="314" y="82" font-family="sans-serif" font-size="9" fill="#10B981">抵抗小 (R₂=10Ω)</text>

  <!-- Formula box -->
  <rect x="280" y="110" width="108" height="36" rx="6" fill="#fff" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="334" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1f2937">V = R × I</text>
  <text x="334" y="140" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">オームの法則</text>

  <!-- Explanation -->
  <text x="334" y="168" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">傾きが大きいほど</text>
  <text x="334" y="180" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">抵抗が大きい</text>
</svg>