<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <marker id="fieldArrow" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#3B82F6"/>
    </marker>
    <marker id="currentArrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#EF4444"/>
    </marker>
  </defs>
  <rect width="300" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f2937">直線電流のまわりの磁界</text>

  <!-- Wire (vertical) -->
  <line x1="150" y1="170" x2="150" y2="42" stroke="#EF4444" stroke-width="3.5" marker-end="url(#currentArrow)"/>
  <text x="165" y="52" font-family="sans-serif" font-size="10" font-weight="bold" fill="#EF4444">電流 I</text>

  <!-- Concentric circles (magnetic field) -->
  <circle cx="150" cy="110" r="22" fill="none" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="150" cy="110" r="38" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="150" cy="110" r="55" fill="none" stroke="#3B82F6" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="150" cy="110" r="72" fill="none" stroke="#3B82F6" stroke-width="0.6" stroke-dasharray="3,2"/>

  <!-- Direction arrows on inner circle (counterclockwise when viewed from above with current coming toward you) -->
  <path d="M170,104 L174,110 L168,110" fill="#3B82F6"/>
  <path d="M130,116 L126,110 L132,110" fill="#3B82F6"/>

  <!-- Direction arrows on middle circle -->
  <path d="M186,102 L190,109 L184,108" fill="#3B82F6"/>
  <path d="M114,118 L110,111 L116,112" fill="#3B82F6"/>

  <!-- Direction arrows on outer circles -->
  <path d="M150,55 L156,58 L150,61" fill="#3B82F6"/>
  <path d="M150,159 L144,162 L150,165" fill="#3B82F6"/>

  <!-- Labels -->
  <text x="215" y="78" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6">磁界の向き</text>
  <line x1="195" y1="95" x2="210" y2="80" stroke="#3B82F6" stroke-width="0.8"/>

  <!-- Cross-section indicator -->
  <circle cx="150" cy="110" r="5" fill="#EF4444" stroke="#B91C1C" stroke-width="1"/>
  <circle cx="150" cy="110" r="1.5" fill="white"/>

  <!-- Bottom note -->
  <text x="150" y="192" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">電流を中心に同心円状の磁界が広がる</text>
</svg>
