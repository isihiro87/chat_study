<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="motionArrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#F59E0B"/>
    </marker>
    <marker id="inductArrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#10B981"/>
    </marker>
  </defs>
  <rect width="400" height="220" rx="16" fill="#F5F3F0"/>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">電磁誘導と誘導電流</text>

  <!-- === Coil (series of loops) === -->
  <ellipse cx="200" cy="90" rx="28" ry="40" fill="none" stroke="#6B7280" stroke-width="2"/>
  <ellipse cx="210" cy="90" rx="28" ry="40" fill="none" stroke="#6B7280" stroke-width="2"/>
  <ellipse cx="220" cy="90" rx="28" ry="40" fill="none" stroke="#6B7280" stroke-width="2"/>
  <ellipse cx="230" cy="90" rx="28" ry="40" fill="none" stroke="#6B7280" stroke-width="2"/>
  <!-- Coil background to hide overlapping inside -->
  <rect x="195" y="55" width="40" height="70" fill="#F5F3F0" stroke="none"/>
  <!-- Coil front lines -->
  <path d="M200,50 Q200,90 200,130" fill="none" stroke="#6B7280" stroke-width="2"/>
  <path d="M230,50 Q230,90 230,130" fill="none" stroke="#6B7280" stroke-width="2"/>
  <!-- Coil label -->
  <text x="215" y="43" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">コイル</text>

  <!-- === Bar magnet === -->
  <!-- N pole (red) -->
  <rect x="90" y="78" width="40" height="24" rx="3" fill="#EF4444" stroke="#B91C1C" stroke-width="1"/>
  <text x="110" y="94" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff">N</text>
  <!-- S pole (blue) -->
  <rect x="50" y="78" width="40" height="24" rx="3" fill="#3B82F6" stroke="#1D4ED8" stroke-width="1"/>
  <text x="70" y="94" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff">S</text>

  <!-- Motion arrow (magnet moving into coil) -->
  <line x1="135" y1="75" x2="160" y2="75" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#motionArrow)"/>
  <line x1="135" y1="107" x2="160" y2="107" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#motionArrow)"/>
  <text x="148" y="68" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#F59E0B">磁石を動かす</text>

  <!-- === Wire connections from coil to galvanometer === -->
  <!-- Top wire -->
  <path d="M200,50 L200,38 L330,38 L330,70" fill="none" stroke="#374151" stroke-width="1.5"/>
  <!-- Bottom wire -->
  <path d="M230,130 L230,142 L330,142 L330,112" fill="none" stroke="#374151" stroke-width="1.5"/>

  <!-- Induced current arrow on wire -->
  <line x1="260" y1="38" x2="290" y2="38" stroke="#10B981" stroke-width="1.5" marker-end="url(#inductArrow)"/>
  <text x="275" y="32" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#10B981">誘導電流</text>
  <line x1="290" y1="142" x2="260" y2="142" stroke="#10B981" stroke-width="1.5" marker-end="url(#inductArrow)"/>

  <!-- === Galvanometer === -->
  <circle cx="330" cy="90" r="22" fill="#fff" stroke="#374151" stroke-width="1.5"/>
  <text x="330" y="86" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">検流計</text>
  <text x="330" y="96" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">G</text>
  <!-- Needle deflection -->
  <line x1="330" y1="90" x2="340" y2="76" stroke="#EF4444" stroke-width="1.5"/>
  <!-- Scale marks -->
  <line x1="320" y1="72" x2="320" y2="68" stroke="#374151" stroke-width="0.8"/>
  <line x1="330" y1="70" x2="330" y2="66" stroke="#374151" stroke-width="0.8"/>
  <line x1="340" y1="72" x2="340" y2="68" stroke="#374151" stroke-width="0.8"/>

  <!-- Label -->
  <rect x="290" y="118" width="80" height="18" rx="4" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="330" y="130" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981">電磁誘導</text>

  <!-- === Bullet points === -->
  <text x="30" y="168" font-family="sans-serif" font-size="9" fill="#374151">● 速く動かす → 大きい電流</text>
  <text x="30" y="183" font-family="sans-serif" font-size="9" fill="#374151">● 巻数を増やす → 大きい電流</text>
  <text x="30" y="198" font-family="sans-serif" font-size="9" fill="#374151">● 強い磁石を使う → 大きい電流</text>
  <text x="30" y="213" font-family="sans-serif" font-size="8" fill="#6B7280">※ 磁石が止まると電流は流れない</text>
</svg>