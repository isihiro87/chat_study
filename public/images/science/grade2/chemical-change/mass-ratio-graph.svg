<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" fill="none">
  <!-- Background -->
  <rect width="420" height="260" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="210" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">金属と酸素の質量比</text>

  <!-- Axes -->
  <line x1="70" y1="200" x2="380" y2="200" stroke="#374151" stroke-width="2"/>
  <line x1="70" y1="200" x2="70" y2="50" stroke="#374151" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="30" y="125" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151" transform="rotate(-90, 30, 125)">結びつく酸素の質量(g)</text>

  <!-- X-axis label -->
  <text x="225" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">金属の質量(g)</text>

  <!-- Grid lines -->
  <line x1="70" y1="162" x2="380" y2="162" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="125" x2="380" y2="125" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="87" x2="380" y2="87" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Y-axis values -->
  <text x="60" y="204" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">0</text>
  <text x="60" y="166" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">0.5</text>
  <text x="60" y="128" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">1.0</text>
  <text x="60" y="91" text-anchor="end" font-family="sans-serif" font-size="9" fill="#6B7280">1.5</text>

  <!-- X-axis values -->
  <text x="148" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">1.0</text>
  <text x="225" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">2.0</text>
  <text x="303" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">3.0</text>

  <!-- Copper line (4:1) -->
  <line x1="70" y1="200" x2="380" y2="180.5" stroke="#3B82F6" stroke-width="2.5"/>
  <circle cx="148" cy="195" r="4" fill="#3B82F6"/>
  <circle cx="225" cy="190" r="4" fill="#3B82F6"/>
  <circle cx="303" cy="185" r="4" fill="#3B82F6"/>
  <text x="385" y="182" font-family="sans-serif" font-size="9" fill="#3B82F6">Cu</text>

  <!-- Magnesium line (3:2) -->
  <line x1="70" y1="200" x2="303" y2="97" stroke="#EF4444" stroke-width="2.5"/>
  <circle cx="148" cy="166" r="4" fill="#EF4444"/>
  <circle cx="225" cy="131" r="4" fill="#EF4444"/>
  <circle cx="303" cy="97" r="4" fill="#EF4444"/>
  <text x="315" y="93" font-family="sans-serif" font-size="9" fill="#EF4444">Mg</text>

  <!-- Legend -->
  <rect x="100" y="240" width="100" height="15" rx="3" fill="none"/>
  <line x1="105" y1="248" x2="125" y2="248" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="130" y="252" font-family="sans-serif" font-size="10" fill="#3B82F6">銅:酸素 = 4:1</text>

  <rect x="250" y="240" width="130" height="15" rx="3" fill="none"/>
  <line x1="255" y1="248" x2="275" y2="248" stroke="#EF4444" stroke-width="2.5"/>
  <text x="280" y="252" font-family="sans-serif" font-size="10" fill="#EF4444">Mg:酸素 = 3:2</text>
</svg>
