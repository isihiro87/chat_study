<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" fill="none">
  <!-- Background -->
  <rect width="420" height="220" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="210" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">おもな元素と元素記号</text>

  <!-- Row 1: Nonmetals -->
  <rect x="20" y="40" width="55" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="47" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">H</text>
  <text x="47" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">水素</text>

  <rect x="85" y="40" width="55" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="112" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">C</text>
  <text x="112" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">炭素</text>

  <rect x="150" y="40" width="55" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="177" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">N</text>
  <text x="177" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">窒素</text>

  <rect x="215" y="40" width="55" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="242" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8">O</text>
  <text x="242" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1D4ED8">酸素</text>

  <rect x="280" y="40" width="55" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="307" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#059669">S</text>
  <text x="307" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#059669">硫黄</text>

  <rect x="345" y="40" width="55" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="372" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#059669">Cl</text>
  <text x="372" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#059669">塩素</text>

  <!-- Row 2: Metals -->
  <rect x="20" y="95" width="55" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="47" y="111" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D97706">Na</text>
  <text x="47" y="127" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#D97706">ナトリウム</text>

  <rect x="85" y="95" width="55" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="112" y="111" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D97706">Mg</text>
  <text x="112" y="127" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#D97706">マグネシウム</text>

  <rect x="150" y="95" width="55" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="177" y="111" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D97706">Fe</text>
  <text x="177" y="127" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#D97706">鉄</text>

  <rect x="215" y="95" width="55" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="242" y="111" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D97706">Cu</text>
  <text x="242" y="127" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#D97706">銅</text>

  <rect x="280" y="95" width="55" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="307" y="111" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D97706">Ag</text>
  <text x="307" y="127" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#D97706">銀</text>

  <rect x="345" y="95" width="55" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="372" y="111" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D97706">Au</text>
  <text x="372" y="127" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#D97706">金</text>

  <!-- Legend -->
  <rect x="80" y="155" width="18" height="14" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="105" y="166" font-family="sans-serif" font-size="10" fill="#4B5563">非金属元素</text>

  <rect x="170" y="155" width="18" height="14" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="195" y="166" font-family="sans-serif" font-size="10" fill="#4B5563">非金属元素</text>

  <rect x="260" y="155" width="18" height="14" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="285" y="166" font-family="sans-serif" font-size="10" fill="#4B5563">金属元素</text>

  <!-- Tip -->
  <text x="210" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4B5563">覚え方: 元素記号の1文字目は大文字、2文字目は小文字</text>
  <text x="210" y="210" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4B5563">例: Cu(銅)、Fe(鉄) ← ラテン語が由来</text>
</svg>
