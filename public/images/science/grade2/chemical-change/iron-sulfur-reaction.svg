<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" fill="none">
  <!-- Background -->
  <rect width="420" height="240" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="210" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">鉄と硫黄の化合</text>

  <!-- Before: Iron -->
  <rect x="30" y="50" width="80" height="70" rx="10" fill="#D1D5DB" stroke="#6B7280" stroke-width="2"/>
  <text x="70" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">Fe</text>
  <text x="70" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">鉄(灰色)</text>
  <text x="70" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">磁石につく</text>

  <!-- Plus -->
  <text x="130" y="90" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#6B7280">+</text>

  <!-- Before: Sulfur -->
  <rect x="150" y="50" width="80" height="70" rx="10" fill="#FEF9C3" stroke="#EAB308" stroke-width="2"/>
  <text x="190" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#854D0E">S</text>
  <text x="190" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#854D0E">硫黄(黄色)</text>

  <!-- Arrow with heat -->
  <path d="M250 85 L300 85" stroke="#EF4444" stroke-width="3" marker-end="url(#arrowR)"/>
  <text x="275" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#EF4444">加熱</text>

  <!-- After: Iron sulfide -->
  <rect x="315" y="50" width="90" height="70" rx="10" fill="#1F2937" stroke="#111827" stroke-width="2"/>
  <text x="360" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">FeS</text>
  <text x="360" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">硫化鉄(黒色)</text>
  <text x="360" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">磁石につかない</text>

  <!-- Comparison table -->
  <rect x="30" y="145" width="360" height="80" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>

  <!-- Header -->
  <line x1="30" y1="168" x2="390" y2="168" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="150" y1="145" x2="150" y2="225" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="270" y1="145" x2="270" y2="225" stroke="#D1D5DB" stroke-width="1"/>

  <text x="90" y="161" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">性質</text>
  <text x="210" y="161" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">鉄+硫黄(混合物)</text>
  <text x="330" y="161" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">硫化鉄(化合物)</text>

  <text x="90" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">磁石</text>
  <text x="210" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">鉄だけつく</text>
  <text x="330" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">つかない</text>

  <text x="90" y="205" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">塩酸を加える</text>
  <text x="210" y="205" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">水素が発生</text>
  <text x="330" y="205" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4B5563">硫化水素(卵の腐敗臭)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#EF4444"/>
    </marker>
  </defs>
</svg>
