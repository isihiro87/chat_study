<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <rect width="300" height="200" rx="16" fill="#F5F3F0"/>
  <text x="150" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">反射の法則</text>

  <!-- Mirror surface -->
  <line x1="60" y1="130" x2="240" y2="130" stroke="#374151" stroke-width="2.5"/>
  <!-- Hatching below mirror -->
  <line x1="65" y1="133" x2="60" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="80" y1="133" x2="75" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="95" y1="133" x2="90" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="110" y1="133" x2="105" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="125" y1="133" x2="120" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="140" y1="133" x2="135" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="155" y1="133" x2="150" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="170" y1="133" x2="165" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="185" y1="133" x2="180" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="200" y1="133" x2="195" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="215" y1="133" x2="210" y2="138" stroke="#374151" stroke-width="0.8"/>
  <line x1="230" y1="133" x2="225" y2="138" stroke="#374151" stroke-width="0.8"/>

  <!-- Normal line -->
  <line x1="150" y1="50" x2="150" y2="130" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="158" y="55" font-family="sans-serif" font-size="9" fill="#9CA3AF">法線</text>

  <!-- Incident ray (amber) -->
  <line x1="85" y1="55" x2="150" y2="130" stroke="#F59E0B" stroke-width="2.5"/>
  <path d="M122,98 L130,103 L123,108" fill="none" stroke="#F59E0B" stroke-width="2"/>

  <!-- Reflected ray (red) -->
  <line x1="150" y1="130" x2="215" y2="55" stroke="#EF4444" stroke-width="2.5"/>
  <path d="M183,90 L188,83 L193,90" fill="none" stroke="#EF4444" stroke-width="2"/>

  <!-- Angle arcs -->
  <path d="M150,95 Q132,95 122,82" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="108" y="100" font-family="sans-serif" font-size="10" fill="#F59E0B">入射角</text>
  <path d="M150,95 Q168,95 178,82" fill="none" stroke="#EF4444" stroke-width="1.5"/>
  <text x="180" y="100" font-family="sans-serif" font-size="10" fill="#EF4444">反射角</text>

  <!-- Incident point -->
  <circle cx="150" cy="130" r="3" fill="#374151"/>

  <!-- Key formula -->
  <rect x="75" y="155" width="150" height="30" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="150" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#374151">入射角 ＝ 反射角</text>
</svg>