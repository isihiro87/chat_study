<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <rect width="300" height="200" rx="16" fill="#F5F3F0"/>
  <text x="150" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f2937">音の高さ（振動数）</text>

  <!-- High-pitched sound (dense waves, green) -->
  <rect x="15" y="40" width="130" height="100" rx="8" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <text x="80" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981">高い音</text>
  <line x1="25" y1="95" x2="135" y2="95" stroke="#E5E7EB" stroke-width="0.5"/>
  <path d="M25,95 Q30,75 35,95 Q40,115 45,95 Q50,75 55,95 Q60,115 65,95 Q70,75 75,95 Q80,115 85,95 Q90,75 95,95 Q100,115 105,95 Q110,75 115,95 Q120,115 125,95 Q130,75 135,95" fill="none" stroke="#10B981" stroke-width="2.5"/>
  <text x="80" y="130" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#10B981">振動数(Hz)が大きい＝波が密</text>

  <!-- Low-pitched sound (sparse waves, amber) -->
  <rect x="155" y="40" width="130" height="100" rx="8" fill="white" stroke="#D97706" stroke-width="1.5"/>
  <text x="220" y="56" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#D97706">低い音</text>
  <line x1="165" y1="95" x2="275" y2="95" stroke="#E5E7EB" stroke-width="0.5"/>
  <path d="M165,95 Q183,70 201,95 Q219,120 237,95 Q255,70 275,95" fill="none" stroke="#D97706" stroke-width="2.5"/>
  <text x="220" y="130" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#D97706">振動数(Hz)が小さい＝波がまばら</text>

  <!-- Bottom summary -->
  <rect x="25" y="155" width="250" height="32" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="45" cy="172" r="5" fill="#F59E0B"/>
  <text x="58" y="176" font-family="sans-serif" font-size="11" fill="#374151">音の高さ ＝ 振動数 Hz（波の数）</text>
</svg>