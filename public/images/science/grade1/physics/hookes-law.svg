<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <rect width="300" height="200" rx="16" fill="#F5F3F0"/>
  <text x="150" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">フックの法則</text>

  <!-- Graph area -->
  <rect x="40" y="38" width="160" height="140" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Y axis -->
  <line x1="70" y1="155" x2="70" y2="50" stroke="#374151" stroke-width="1.5"/>
  <path d="M67,54 L70,46 L73,54" fill="#374151"/>
  <text x="65" y="50" text-anchor="end" font-family="sans-serif" font-size="10" fill="#374151">のび</text>
  <text x="65" y="62" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">(cm)</text>

  <!-- X axis -->
  <line x1="70" y1="155" x2="185" y2="155" stroke="#374151" stroke-width="1.5"/>
  <path d="M181,152 L189,155 L181,158" fill="#374151"/>
  <text x="185" y="170" text-anchor="end" font-family="sans-serif" font-size="10" fill="#374151">力(N)</text>

  <!-- Grid lines (light) -->
  <line x1="70" y1="135" x2="180" y2="135" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="70" y1="115" x2="180" y2="115" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="70" y1="95" x2="180" y2="95" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="70" y1="75" x2="180" y2="75" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="95" y1="50" x2="95" y2="155" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="120" y1="50" x2="120" y2="155" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="145" y1="50" x2="145" y2="155" stroke="#E5E7EB" stroke-width="0.5"/>
  <line x1="170" y1="50" x2="170" y2="155" stroke="#E5E7EB" stroke-width="0.5"/>

  <!-- Proportional line -->
  <line x1="70" y1="155" x2="170" y2="65" stroke="#3B82F6" stroke-width="2.5"/>

  <!-- Data points -->
  <circle cx="95" cy="132" r="4" fill="#3B82F6"/>
  <circle cx="120" cy="110" r="4" fill="#3B82F6"/>
  <circle cx="145" cy="88" r="4" fill="#3B82F6"/>
  <circle cx="170" cy="65" r="4" fill="#3B82F6"/>

  <!-- Label on graph -->
  <text x="140" y="55" font-family="sans-serif" font-size="10" font-weight="bold" fill="#3B82F6">比例のグラフ</text>

  <!-- Key formula (right side) -->
  <rect x="210" y="50" width="80" height="90" rx="8" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="250" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6">ポイント</text>
  <text x="250" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">ばねの</text>
  <text x="250" y="104" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">伸び</text>
  <text x="250" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#3B82F6">∝</text>
  <text x="250" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">力の大きさ</text>

  <!-- Bottom note -->
  <text x="150" y="192" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">力を2倍にすると、ばねの伸びも2倍になる</text>
</svg>