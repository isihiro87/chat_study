<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <rect width="300" height="200" rx="16" fill="#F5F3F0"/>
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#374151">力の矢印の3要素</text>

  <!-- Surface -->
  <line x1="40" y1="130" x2="220" y2="130" stroke="#374151" stroke-width="2"/>
  <!-- Hatching -->
  <line x1="50" y1="133" x2="45" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="70" y1="133" x2="65" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="90" y1="133" x2="85" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="110" y1="133" x2="105" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="130" y1="133" x2="125" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="150" y1="133" x2="145" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="170" y1="133" x2="165" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="190" y1="133" x2="185" y2="139" stroke="#374151" stroke-width="0.8"/>
  <line x1="210" y1="133" x2="205" y2="139" stroke="#374151" stroke-width="0.8"/>

  <!-- Object -->
  <rect x="100" y="85" width="60" height="45" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1e40af">物体</text>

  <!-- Gravity arrow (red, down) -->
  <line x1="130" y1="112" x2="130" y2="160" stroke="#EF4444" stroke-width="3"/>
  <path d="M125,156 L130,165 L135,156" fill="#EF4444"/>
  <text x="148" y="160" font-family="sans-serif" font-size="9" font-weight="bold" fill="#EF4444">重力</text>

  <!-- Normal force arrow (green, up) -->
  <line x1="130" y1="85" x2="130" y2="48" stroke="#10B981" stroke-width="3"/>
  <path d="M125,52 L130,43 L135,52" fill="#10B981"/>
  <text x="148" y="55" font-family="sans-serif" font-size="9" font-weight="bold" fill="#10B981">垂直抗力</text>

  <!-- Action point (amber circle) -->
  <circle cx="130" cy="112" r="4" fill="#F59E0B"/>
  <!-- Leader line to label -->
  <line x1="95" y1="72" x2="127" y2="108" stroke="#F59E0B" stroke-width="1"/>
  <text x="80" y="68" font-family="sans-serif" font-size="9" font-weight="bold" fill="#F59E0B">作用点</text>

  <!-- 3 elements list -->
  <rect x="210" y="42" width="80" height="75" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="250" y="58" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#374151">3要素</text>
  <text x="222" y="74" font-family="sans-serif" font-size="9" fill="#F59E0B">1. 作用点</text>
  <text x="222" y="90" font-family="sans-serif" font-size="9" fill="#374151">2. 向き</text>
  <text x="222" y="106" font-family="sans-serif" font-size="9" fill="#374151">3. 大きさ</text>

  <!-- Unit info at bottom -->
  <rect x="20" y="170" width="260" height="22" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="150" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">N（ニュートン）：100gの物体にはたらく重力 ≒ 1N</text>
</svg>