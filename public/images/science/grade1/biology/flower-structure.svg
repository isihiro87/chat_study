<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" rx="16" fill="#F5F3F0"/>
  <text x="150" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">花のつくり（断面図）</text>

  <!-- Stem -->
  <rect x="143" y="220" width="14" height="60" rx="3" fill="#86EFAC"/>

  <!-- Receptacle (花たく) -->
  <ellipse cx="150" cy="220" rx="35" ry="12" fill="#4ADE80"/>

  <!-- Sepals (がく) -->
  <path d="M115,218 Q100,200 108,185" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M185,218 Q200,200 192,185" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Petals (花弁) -->
  <ellipse cx="95" cy="155" rx="22" ry="35" fill="#FECACA" stroke="#FCA5A5" stroke-width="1" transform="rotate(-20 95 155)"/>
  <ellipse cx="205" cy="155" rx="22" ry="35" fill="#FECACA" stroke="#FCA5A5" stroke-width="1" transform="rotate(20 205 155)"/>
  <ellipse cx="140" cy="105" rx="20" ry="35" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" transform="rotate(-10 140 105)"/>
  <ellipse cx="160" cy="105" rx="20" ry="35" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" transform="rotate(10 160 105)"/>

  <!-- Pistil (めしべ) - center -->
  <line x1="150" y1="210" x2="150" y2="130" stroke="#059669" stroke-width="3"/>
  <!-- Stigma (柱頭) -->
  <circle cx="150" cy="126" r="6" fill="#059669"/>
  <!-- Ovary (子房) -->
  <ellipse cx="150" cy="210" rx="12" ry="10" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/>
  <!-- Ovules (胚珠) -->
  <circle cx="146" cy="210" r="3" fill="#F59E0B"/>
  <circle cx="154" cy="210" r="3" fill="#F59E0B"/>

  <!-- Stamens (おしべ) -->
  <line x1="135" y1="200" x2="120" y2="140" stroke="#D97706" stroke-width="2"/>
  <ellipse cx="118" cy="136" rx="5" ry="8" fill="#F59E0B"/>
  <line x1="165" y1="200" x2="180" y2="140" stroke="#D97706" stroke-width="2"/>
  <ellipse cx="182" cy="136" rx="5" ry="8" fill="#F59E0B"/>

  <!-- Labels -->
  <line x1="156" y1="126" x2="230" y2="100" stroke="#374151" stroke-width="0.8"/>
  <text x="232" y="104" font-family="sans-serif" font-size="9" fill="#374151">柱頭</text>

  <line x1="192" y1="136" x2="240" y2="130" stroke="#374151" stroke-width="0.8"/>
  <text x="242" y="134" font-family="sans-serif" font-size="9" fill="#374151">やく</text>

  <text x="250" y="148" font-family="sans-serif" font-size="7" fill="#6B7280">（花粉が入っている）</text>

  <line x1="162" y1="210" x2="230" y2="210" stroke="#374151" stroke-width="0.8"/>
  <text x="232" y="214" font-family="sans-serif" font-size="9" fill="#374151">子房</text>

  <line x1="155" y1="213" x2="230" y2="230" stroke="#374151" stroke-width="0.8"/>
  <text x="232" y="234" font-family="sans-serif" font-size="9" fill="#374151">胚珠</text>

  <!-- Legend at bottom -->
  <rect x="20" y="255" width="260" height="35" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="45" cy="272" r="5" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="55" y="276" font-family="sans-serif" font-size="8" fill="#374151">花弁</text>
  <circle cx="95" cy="272" r="5" fill="#F59E0B"/>
  <text x="105" y="276" font-family="sans-serif" font-size="8" fill="#374151">おしべ</text>
  <circle cx="150" cy="272" r="5" fill="#059669"/>
  <text x="160" y="276" font-family="sans-serif" font-size="8" fill="#374151">めしべ</text>
  <circle cx="205" cy="272" r="5" fill="#16A34A"/>
  <text x="215" y="276" font-family="sans-serif" font-size="8" fill="#374151">がく</text>
</svg>
