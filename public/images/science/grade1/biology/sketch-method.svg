<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" rx="16" fill="#F5F3F0"/>
  <text x="150" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">スケッチのしかた</text>

  <!-- Good example -->
  <rect x="20" y="40" width="120" height="150" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
  <text x="80" y="58" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10B981">良い例</text>
  <!-- Simple leaf outline - thin single lines -->
  <path d="M60,120 Q65,80 80,70 Q95,80 100,120 Q80,130 60,120Z" fill="none" stroke="#374151" stroke-width="1"/>
  <!-- Vein lines -->
  <line x1="80" y1="70" x2="80" y2="125" stroke="#374151" stroke-width="0.8"/>
  <line x1="80" y1="90" x2="68" y2="105" stroke="#374151" stroke-width="0.6"/>
  <line x1="80" y1="90" x2="92" y2="105" stroke="#374151" stroke-width="0.6"/>
  <text x="80" y="160" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">細い1本線</text>
  <text x="80" y="172" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">影をつけない</text>
  <text x="80" y="184" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">特徴を正確に</text>

  <!-- Bad example -->
  <rect x="160" y="40" width="120" height="150" rx="8" fill="white" stroke="#EF4444" stroke-width="2"/>
  <text x="220" y="58" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#EF4444">悪い例</text>
  <!-- Filled/messy leaf -->
  <path d="M200,120 Q205,80 220,70 Q235,80 240,120 Q220,130 200,120Z" fill="#D1D5DB" stroke="#374151" stroke-width="2"/>
  <path d="M202,118 Q207,82 220,72 Q233,82 238,118 Q220,128 202,118Z" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="220" y="160" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">塗りつぶし</text>
  <text x="220" y="172" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EF4444">二重線</text>
  <text x="220" y="184" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EF4444">太い線</text>

  <!-- Rules at bottom -->
  <rect x="20" y="205" width="260" height="80" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="150" y="223" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1f2937">スケッチのルール</text>
  <circle cx="40" cy="240" r="4" fill="#F59E0B"/>
  <text x="52" y="244" font-family="sans-serif" font-size="9" fill="#374151">細い1本線で輪郭を描く</text>
  <circle cx="40" cy="258" r="4" fill="#F59E0B"/>
  <text x="52" y="262" font-family="sans-serif" font-size="9" fill="#374151">影をつけない・色をぬらない</text>
  <circle cx="40" cy="276" r="4" fill="#F59E0B"/>
  <text x="52" y="280" font-family="sans-serif" font-size="9" fill="#374151">特徴を正確にとらえて描く</text>
</svg>
