<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" rx="16" fill="#F5F3F0"/>
  <text x="150" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">顕微鏡の各部と使い方</text>

  <!-- Microscope body -->
  <!-- Base -->
  <rect x="80" y="248" width="100" height="12" rx="4" fill="#6B7280"/>
  <!-- Arm -->
  <rect x="125" y="100" width="12" height="150" rx="3" fill="#9CA3AF"/>
  <!-- Tube -->
  <rect x="90" y="60" width="14" height="80" rx="3" fill="#6B7280" transform="rotate(-10 97 100)"/>
  <!-- Eyepiece -->
  <rect x="82" y="50" width="18" height="20" rx="4" fill="#4B5563" transform="rotate(-10 91 60)"/>
  <!-- Stage -->
  <rect x="85" y="195" width="80" height="8" rx="2" fill="#9CA3AF"/>
  <!-- Objective lens -->
  <rect x="107" y="162" width="8" height="25" rx="2" fill="#4B5563"/>
  <!-- Clips -->
  <rect x="90" y="192" width="12" height="4" rx="1" fill="#F59E0B"/>
  <rect x="148" y="192" width="12" height="4" rx="1" fill="#F59E0B"/>
  <!-- Focus knob -->
  <circle cx="137" cy="160" r="8" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  <!-- Mirror -->
  <ellipse cx="130" cy="238" rx="15" ry="8" fill="#93C5FD" stroke="#6B7280" stroke-width="1"/>

  <!-- Labels -->
  <line x1="78" y1="58" x2="50" y2="50" stroke="#374151" stroke-width="0.8"/>
  <text x="15" y="54" font-family="sans-serif" font-size="8" fill="#374151">接眼レンズ</text>

  <line x1="105" y1="130" x2="55" y2="130" stroke="#374151" stroke-width="0.8"/>
  <text x="30" y="126" font-family="sans-serif" font-size="8" fill="#374151">鏡筒</text>

  <line x1="110" y1="175" x2="60" y2="175" stroke="#374151" stroke-width="0.8"/>
  <text x="15" y="179" font-family="sans-serif" font-size="8" fill="#374151">対物レンズ</text>

  <line x1="150" y1="160" x2="195" y2="140" stroke="#374151" stroke-width="0.8"/>
  <text x="198" y="144" font-family="sans-serif" font-size="8" fill="#374151">調節ねじ</text>

  <line x1="165" y1="199" x2="200" y2="195" stroke="#374151" stroke-width="0.8"/>
  <text x="203" y="199" font-family="sans-serif" font-size="8" fill="#374151">ステージ</text>

  <line x1="160" y1="192" x2="210" y2="170" stroke="#374151" stroke-width="0.8"/>
  <text x="213" y="174" font-family="sans-serif" font-size="8" fill="#374151">クリップ</text>

  <line x1="145" y1="238" x2="210" y2="230" stroke="#374151" stroke-width="0.8"/>
  <text x="213" y="234" font-family="sans-serif" font-size="8" fill="#374151">反射鏡</text>

  <line x1="137" y1="100" x2="200" y2="100" stroke="#374151" stroke-width="0.8"/>
  <text x="203" y="104" font-family="sans-serif" font-size="8" fill="#374151">アーム</text>

  <!-- Usage steps -->
  <text x="150" y="280" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">低倍率→ピント合わせ→高倍率の順で観察</text>
</svg>
