<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" rx="16" fill="#F5F3F0"/>
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f2937">無脊椎動物の分類</text>

  <!-- Root -->
  <rect x="85" y="35" width="130" height="22" rx="6" fill="#6B7280"/>
  <text x="150" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">無脊椎動物（背骨なし）</text>

  <!-- Branches -->
  <line x1="115" y1="57" x2="75" y2="75" stroke="#374151" stroke-width="1.2"/>
  <line x1="185" y1="57" x2="225" y2="75" stroke="#374151" stroke-width="1.2"/>

  <!-- 節足動物 -->
  <rect x="15" y="75" width="120" height="22" rx="6" fill="#F59E0B"/>
  <text x="75" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">節足動物</text>

  <!-- 軟体動物 & その他 -->
  <rect x="165" y="75" width="120" height="22" rx="6" fill="#0EA5E9"/>
  <text x="225" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="white">軟体動物</text>

  <!-- 節足動物 description -->
  <rect x="15" y="103" width="120" height="28" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="75" y="116" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">外骨格 + 節のあるあし</text>
  <text x="75" y="127" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">からだが分かれている</text>

  <!-- 節足動物 subtypes -->
  <line x1="45" y1="131" x2="35" y2="145" stroke="#374151" stroke-width="1"/>
  <line x1="105" y1="131" x2="115" y2="145" stroke="#374151" stroke-width="1"/>

  <!-- 昆虫類 -->
  <rect x="5" y="145" width="60" height="50" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="35" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#92400E">昆虫類</text>
  <text x="35" y="170" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">頭・胸・腹</text>
  <text x="35" y="180" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">あし6本</text>
  <text x="35" y="190" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">バッタ等</text>

  <!-- 甲殻類 -->
  <rect x="75" y="145" width="60" height="50" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="105" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#92400E">甲殻類</text>
  <text x="105" y="170" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">頭胸部・腹部</text>
  <text x="105" y="180" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">あし多数</text>
  <text x="105" y="190" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">エビ・カニ</text>

  <!-- 軟体動物 description -->
  <rect x="165" y="103" width="120" height="50" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="225" y="118" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#374151">特徴</text>
  <text x="225" y="131" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">外とう膜をもつ</text>
  <text x="225" y="143" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">内臓が外とう膜につつまれる</text>

  <!-- 軟体動物 examples -->
  <rect x="165" y="160" width="55" height="35" rx="5" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1"/>
  <text x="192" y="175" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#0369A1">イカ</text>
  <text x="192" y="188" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#0369A1">タコ</text>

  <rect x="230" y="160" width="55" height="35" rx="5" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1"/>
  <text x="257" y="175" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#0369A1">アサリ</text>
  <text x="257" y="188" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#0369A1">マイマイ</text>

  <!-- その他 -->
  <rect x="80" y="210" width="140" height="45" rx="6" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="150" y="225" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#374151">その他の無脊椎動物</text>
  <text x="150" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">ウニ・ヒトデ（棘皮動物）/ ミミズ（環形動物）</text>
  <text x="150" y="250" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">クラゲ（刺胞動物）</text>

  <text x="150" y="280" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">動物全体の約95%は無脊椎動物</text>
</svg>
