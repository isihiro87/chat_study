<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" rx="16" fill="#F5F3F0"/>
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f2937">マグマのねばりけと火山の形</text>

  <!-- Header labels -->
  <text x="55" y="45" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#EF4444">ねばりけ：弱い</text>
  <text x="150" y="45" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#F59E0B">ねばりけ：中</text>
  <text x="245" y="45" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#374151">ねばりけ：強い</text>

  <!-- Arrow -->
  <line x1="30" y1="52" x2="270" y2="52" stroke="#D1D5DB" stroke-width="1"/>
  <path d="M265,49 L270,52 L265,55" fill="none" stroke="#D1D5DB" stroke-width="1"/>
  <text x="150" y="62" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9CA3AF">ねばりけが強くなる →</text>

  <!-- 1. Shield volcano (楯状) -->
  <path d="M10,160 Q55,100 100,160" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="55" y="175" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">楯状火山</text>
  <text x="55" y="188" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">なだらか</text>
  <text x="55" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">マウナロア</text>

  <!-- 2. Cone volcano (円すい) -->
  <path d="M115,160 Q150,80 185,160" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="150" y="175" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">円すい形</text>
  <text x="150" y="188" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">バランスのよい形</text>
  <text x="150" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">富士山・桜島</text>

  <!-- 3. Dome volcano (溶岩ドーム) -->
  <path d="M210,160 Q245,100 280,160" fill="#E5E7EB" stroke="#374151" stroke-width="1.5"/>
  <!-- More dome-like shape -->
  <path d="M220,160 Q245,108 270,160" fill="#D1D5DB" stroke="#374151" stroke-width="1"/>
  <text x="245" y="175" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">溶岩ドーム</text>
  <text x="245" y="188" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">盛り上がった形</text>
  <text x="245" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">昭和新山・雲仙</text>

  <!-- Comparison table -->
  <rect x="15" y="215" width="270" height="72" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="150" y="232" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1f2937">噴火のようすの比較</text>

  <text x="60" y="250" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EF4444">おだやかに流れる</text>
  <text x="60" y="263" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EF4444">溶岩が遠くまで広がる</text>
  <text x="60" y="276" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">色：黒っぽい</text>

  <line x1="110" y1="240" x2="110" y2="280" stroke="#E5E7EB" stroke-width="1"/>

  <text x="150" y="250" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F59E0B">中間的な噴火</text>
  <text x="150" y="263" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F59E0B">溶岩と噴出物</text>

  <line x1="190" y1="240" x2="190" y2="280" stroke="#E5E7EB" stroke-width="1"/>

  <text x="240" y="250" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">爆発的な噴火</text>
  <text x="240" y="263" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">火山灰・火山弾</text>
  <text x="240" y="276" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">色：白っぽい</text>
</svg>
