<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <!-- Background -->
  <rect width="300" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#10B981">上方置換法</text>

  <!-- Bottle -->
  <rect x="100" y="45" width="80" height="85" rx="6" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">集気びん</text>

  <!-- Gas rising arrows -->
  <path d="M125,120 L125,80" stroke="#10B981" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M140,120 L140,80" stroke="#10B981" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M155,120 L155,80" stroke="#10B981" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M121,84 L125,75 L129,84" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <path d="M136,84 L140,75 L144,84" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <path d="M151,84 L155,75 L159,84" fill="none" stroke="#10B981" stroke-width="1.5"/>

  <!-- Label -->
  <text x="200" y="60" font-family="sans-serif" font-size="10" fill="#10B981">↑ 軽い気体が</text>
  <text x="200" y="74" font-family="sans-serif" font-size="10" fill="#10B981">   上に集まる</text>

  <!-- Gas tube from bottom -->
  <line x1="140" y1="130" x2="140" y2="148" stroke="#374151" stroke-width="2"/>
  <line x1="70" y1="148" x2="140" y2="148" stroke="#374151" stroke-width="2"/>
  <text x="70" y="144" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">ガス管</text>

  <!-- Arrow showing gas entry -->
  <path d="M100,148 L120,148" stroke="#10B981" stroke-width="1.5"/>
  <path d="M116,145 L122,148 L116,151" fill="#10B981"/>

  <!-- Air escaping note -->
  <text x="140" y="40" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">空気は下から出ていく</text>

  <!-- Info section -->
  <rect x="15" y="155" width="270" height="38" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="150" y="171" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#374151">条件: 空気より軽い ＋ 水に溶けやすい（NH₃）</text>
  <text x="150" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">気体は上に集まり、空気は下から押し出される</text>
</svg>
