<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <!-- Background -->
  <rect width="300" height="200" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3B82F6">水上置換法</text>

  <!-- Water trough -->
  <rect x="60" y="75" width="180" height="70" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="150" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3B82F6">水</text>

  <!-- Inverted bottle -->
  <rect x="120" y="50" width="60" height="65" rx="4" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="150" y="80" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">集気びん</text>
  <text x="150" y="92" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">(逆さ)</text>

  <!-- Bubbles -->
  <circle cx="130" cy="120" r="4" fill="#93C5FD" opacity="0.5"/>
  <circle cx="145" cy="112" r="3" fill="#93C5FD" opacity="0.5"/>
  <circle cx="138" cy="105" r="3.5" fill="#93C5FD" opacity="0.5"/>
  <circle cx="155" cy="108" r="2.5" fill="#93C5FD" opacity="0.5"/>

  <!-- Gas tube -->
  <line x1="30" y1="120" x2="125" y2="120" stroke="#374151" stroke-width="2"/>
  <line x1="30" y1="120" x2="30" y2="100" stroke="#374151" stroke-width="2"/>
  <text x="30" y="95" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#374151">ガス管</text>

  <!-- Arrow showing gas -->
  <path d="M40,120 L60,120" stroke="#3B82F6" stroke-width="1.5"/>
  <path d="M56,117 L62,120 L56,123" fill="#3B82F6"/>

  <!-- Info section -->
  <rect x="15" y="152" width="270" height="38" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="150" y="168" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#374151">条件: 水に溶けにくい気体（O₂, H₂, N₂）</text>
  <text x="150" y="183" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#10B981">利点: 純粋な気体を集められる</text>
</svg>
