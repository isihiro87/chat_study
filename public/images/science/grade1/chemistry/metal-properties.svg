<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" rx="16" fill="#F5F3F0"/>
  <text x="150" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">金属の4つの性質</text>

  <!-- Property 1: 金属光沢 -->
  <rect x="15" y="42" width="125" height="100" rx="10" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="77" cy="78" r="22" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="77" y="74" text-anchor="middle" font-family="sans-serif" font-size="20">✨</text>
  <text x="77" y="92" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F59E0B">キラッ</text>
  <text x="77" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">金属光沢</text>
  <text x="77" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">みがくと光る</text>

  <!-- Property 2: 電気伝導性 -->
  <rect x="160" y="42" width="125" height="100" rx="10" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="222" cy="78" r="22" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="222" y="82" text-anchor="middle" font-family="sans-serif" font-size="20">⚡</text>
  <text x="222" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">電気伝導性</text>
  <text x="222" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">電気・熱を通す</text>

  <!-- Property 3: 展性 -->
  <rect x="15" y="155" width="125" height="100" rx="10" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="77" cy="191" r="22" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <!-- Flattening icon -->
  <rect x="64" y="183" width="26" height="6" rx="2" fill="#10B981"/>
  <text x="77" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#10B981">ペタン</text>
  <text x="77" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">展性</text>
  <text x="77" y="243" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">たたくと広がる</text>

  <!-- Property 4: 延性 -->
  <rect x="160" y="155" width="125" height="100" rx="10" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <circle cx="222" cy="191" r="22" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <!-- Stretching icon -->
  <line x1="209" y1="191" x2="235" y2="191" stroke="#EF4444" stroke-width="3" stroke-linecap="round"/>
  <path d="M206,188 L203,191 L206,194" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <path d="M238,188 L241,191 L238,194" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <text x="222" y="228" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">延性</text>
  <text x="222" y="243" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">引っぱると伸びる</text>

  <!-- Footer -->
  <text x="150" y="275" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">非金属にはこれらの性質がない</text>
  <text x="150" y="290" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B7280">例：金、銀、銅、鉄、アルミニウム</text>
</svg>
