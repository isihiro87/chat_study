<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Background -->
  <rect width="400" height="280" rx="16" fill="#F5F3F0"/>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">ダニエル電池のしくみ</text>

  <!-- Left beaker (zinc side) -->
  <rect x="30" y="70" width="150" height="140" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="105" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1E40AF">硫酸亜鉛水溶液</text>

  <!-- Right beaker (copper side) -->
  <rect x="220" y="70" width="150" height="140" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="295" y="90" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#991B1B">硫酸銅水溶液</text>

  <!-- Separator membrane -->
  <rect x="180" y="70" width="40" height="140" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400E" transform="rotate(-90 200 145)">セロハン膜</text>

  <!-- Zinc plate (-) -->
  <rect x="60" y="95" width="12" height="100" rx="3" fill="#6B7280" stroke="#374151" stroke-width="1.5"/>
  <text x="66" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1D4ED8">Zn (- 極)</text>

  <!-- Copper plate (+) -->
  <rect x="328" y="95" width="12" height="100" rx="3" fill="#D97706" stroke="#92400E" stroke-width="1.5"/>
  <text x="334" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#DC2626">Cu (+ 極)</text>

  <!-- Wire connection -->
  <path d="M66 95 L66 50 L334 50 L334 95" stroke="#374151" stroke-width="2.5" fill="none"/>

  <!-- Electron flow arrows on wire -->
  <path d="M120 50 L160 50" stroke="#3B82F6" stroke-width="2" marker-end="url(#bluearrow)"/>
  <path d="M230 50 L270 50" stroke="#3B82F6" stroke-width="2" marker-end="url(#bluearrow)"/>
  <text x="200" y="43" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3B82F6">電子 e⁻ の流れ →</text>

  <!-- Zn ions leaving -->
  <circle cx="95" cy="130" r="10" fill="#3B82F6" opacity="0.7"/>
  <text x="95" y="134" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Zn²⁺</text>
  <circle cx="110" cy="165" r="10" fill="#3B82F6" opacity="0.5"/>
  <text x="110" y="169" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Zn²⁺</text>

  <!-- Cu ions depositing -->
  <circle cx="300" cy="140" r="10" fill="#EF4444" opacity="0.5"/>
  <text x="300" y="144" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Cu²⁺</text>
  <circle cx="280" cy="170" r="10" fill="#EF4444" opacity="0.7"/>
  <text x="280" y="174" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">Cu²⁺</text>

  <!-- Bottom explanation -->
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4B5563">Zn → Zn²⁺ + 2e⁻ (電子放出) → Cu²⁺ + 2e⁻ → Cu (銅が析出)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="bluearrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3B82F6"/>
    </marker>
  </defs>
</svg>
