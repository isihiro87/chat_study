<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <marker id="fieldArrow" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#3B82F6"/>
    </marker>
    <marker id="currentArrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#EF4444"/>
    </marker>
  </defs>
  <rect width="400" height="220" rx="16" fill="#F5F3F0"/>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">電流がつくる磁界と右手の法則</text>

  <!-- Divider -->
  <line x1="200" y1="32" x2="200" y2="210" stroke="#D1D5DB" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- === Left: Straight wire with concentric magnetic field === -->
  <text x="100" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#3B82F6">直線電流のまわりの磁界</text>

  <!-- Wire (vertical) -->
  <line x1="100" y1="180" x2="100" y2="58" stroke="#EF4444" stroke-width="3" marker-end="url(#currentArrow)"/>
  <text x="112" y="70" font-family="sans-serif" font-size="9" fill="#EF4444">電流 I</text>

  <!-- Concentric circles (magnetic field) -->
  <circle cx="100" cy="125" r="20" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="100" cy="125" r="35" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="100" cy="125" r="50" fill="none" stroke="#3B82F6" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="100" cy="125" r="65" fill="none" stroke="#3B82F6" stroke-width="0.6" stroke-dasharray="3,2"/>

  <!-- Direction arrows on circles (counterclockwise) -->
  <!-- Inner circle arrows -->
  <path d="M118,119 L122,125 L116,125" fill="#3B82F6"/>
  <path d="M82,131 L78,125 L84,125" fill="#3B82F6"/>
  <!-- Middle circle arrows -->
  <path d="M133,117 L137,124 L131,123" fill="#3B82F6"/>
  <path d="M67,133 L63,126 L69,127" fill="#3B82F6"/>
  <!-- Outer circle arrows -->
  <path d="M100,60 L106,63 L100,66" fill="#3B82F6"/>
  <path d="M100,184 L94,187 L100,190" fill="#3B82F6"/>

  <!-- Label -->
  <text x="100" y="205" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">磁界は同心円状に広がる</text>

  <!-- === Right: Right-hand rule diagram === -->
  <text x="305" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#10B981">右手の法則</text>

  <!-- Simplified hand shape -->
  <!-- Palm/fist outline -->
  <ellipse cx="305" cy="125" rx="35" ry="40" fill="#FDEBD0" stroke="#D4A574" stroke-width="1.5"/>

  <!-- Thumb pointing up -->
  <rect x="298" y="68" width="14" height="35" rx="6" fill="#FDEBD0" stroke="#D4A574" stroke-width="1.5"/>

  <!-- Thumb arrow (current direction) -->
  <line x1="305" y1="68" x2="305" y2="55" stroke="#EF4444" stroke-width="2" marker-end="url(#currentArrow)"/>
  <text x="330" y="60" font-family="sans-serif" font-size="9" font-weight="bold" fill="#EF4444">電流</text>
  <text x="330" y="70" font-family="sans-serif" font-size="8" fill="#EF4444">(親指)</text>

  <!-- Curling fingers arrows -->
  <path d="M270,120 Q265,100 280,90" fill="none" stroke="#3B82F6" stroke-width="1.8"/>
  <path d="M278,92 L280,90 L282,95" fill="#3B82F6"/>
  <path d="M340,120 Q345,140 330,155" fill="none" stroke="#3B82F6" stroke-width="1.8"/>
  <path d="M332,153 L330,155 L328,150" fill="#3B82F6"/>

  <!-- Finger curl label -->
  <text x="250" y="108" text-anchor="end" font-family="sans-serif" font-size="9" font-weight="bold" fill="#3B82F6">磁界</text>
  <text x="250" y="118" text-anchor="end" font-family="sans-serif" font-size="8" fill="#3B82F6">(4本指)</text>

  <!-- Summary -->
  <text x="305" y="190" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">親指 = 電流の向き</text>
  <text x="305" y="203" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">残り4本指 = 磁界の向き</text>
</svg>