<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#F5F3F0" rx="16"/>
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">飽和水蒸気量曲線と露点</text>

  <!-- Graph area -->
  <!-- Axes -->
  <line x1="70" y1="200" x2="370" y2="200" stroke="#374151" stroke-width="1.5"/>
  <line x1="70" y1="200" x2="70" y2="40" stroke="#374151" stroke-width="1.5"/>

  <!-- X-axis labels (気温) -->
  <text x="220" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">気温 (°C)</text>
  <text x="70" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">0</text>
  <text x="113" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">5</text>
  <text x="156" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">10</text>
  <text x="199" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">15</text>
  <text x="242" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">20</text>
  <text x="285" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">25</text>
  <text x="328" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">30</text>
  <text x="370" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6B7280">35</text>

  <!-- X-axis ticks -->
  <line x1="113" y1="200" x2="113" y2="203" stroke="#374151" stroke-width="1"/>
  <line x1="156" y1="200" x2="156" y2="203" stroke="#374151" stroke-width="1"/>
  <line x1="199" y1="200" x2="199" y2="203" stroke="#374151" stroke-width="1"/>
  <line x1="242" y1="200" x2="242" y2="203" stroke="#374151" stroke-width="1"/>
  <line x1="285" y1="200" x2="285" y2="203" stroke="#374151" stroke-width="1"/>
  <line x1="328" y1="200" x2="328" y2="203" stroke="#374151" stroke-width="1"/>
  <line x1="370" y1="200" x2="370" y2="203" stroke="#374151" stroke-width="1"/>

  <!-- Y-axis labels (飽和水蒸気量) -->
  <text x="18" y="125" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151" transform="rotate(-90 18 125)">飽和水蒸気量 (g/m³)</text>
  <text x="63" y="203" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">0</text>
  <text x="63" y="163" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">10</text>
  <text x="63" y="123" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">20</text>
  <text x="63" y="83" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">30</text>
  <text x="63" y="43" text-anchor="end" font-family="sans-serif" font-size="8" fill="#6B7280">40</text>

  <!-- Y-axis ticks -->
  <line x1="67" y1="160" x2="70" y2="160" stroke="#374151" stroke-width="1"/>
  <line x1="67" y1="120" x2="70" y2="120" stroke="#374151" stroke-width="1"/>
  <line x1="67" y1="80" x2="70" y2="80" stroke="#374151" stroke-width="1"/>
  <line x1="67" y1="40" x2="70" y2="40" stroke="#374151" stroke-width="1"/>

  <!-- Grid lines (light) -->
  <line x1="70" y1="160" x2="370" y2="160" stroke="#D1D5DB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="70" y1="120" x2="370" y2="120" stroke="#D1D5DB" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="70" y1="80" x2="370" y2="80" stroke="#D1D5DB" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Saturation curve: approx values 0°C=4.8, 5°C=6.8, 10°C=9.4, 15°C=12.8, 20°C=17.3, 25°C=23.1, 30°C=30.4, 35°C=39.6 -->
  <!-- Y scale: 0=200, 40=40 => 1g = 4px. X scale: 0°C=70, 35°C=370 => 1°C=8.57px -->
  <!-- Points: (70,180.8) (113,172.8) (156,162.4) (199,148.8) (242,130.8) (285,107.6) (328,78.4) (370,41.6) -->
  <path d="M70,180.8 C90,177 100,175 113,172.8 C130,169 143,166 156,162.4 C170,158 185,153 199,148.8 C215,143 228,137 242,130.8 C258,123 272,116 285,107.6 C302,96 315,88 328,78.4 C345,64 358,52 370,41.6" fill="none" stroke="#3B82F6" stroke-width="2.5"/>

  <!-- Shaded area under the curve for context -->
  <path d="M70,180.8 C90,177 100,175 113,172.8 C130,169 143,166 156,162.4 C170,158 185,153 199,148.8 C215,143 228,137 242,130.8 C258,123 272,116 285,107.6 C302,96 315,88 328,78.4 C345,64 358,52 370,41.6 L370,200 L70,200 Z" fill="#3B82F6" opacity="0.06"/>

  <!-- Actual humidity point at 20°C, 12g/m³ -->
  <!-- 20°C => x=242, 12g => y=200-12*4=152 -->
  <circle cx="242" cy="152" r="4" fill="#EF4444"/>
  <text x="252" y="148" font-family="sans-serif" font-size="8" fill="#EF4444">実際の水蒸気量 12g/m³</text>

  <!-- Horizontal dashed line from point to curve intersection (露点 ~14°C) -->
  <!-- 14°C => x=70+14*8.57=190, at 12g/m³ => y=152 -->
  <line x1="190" y1="152" x2="242" y2="152" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Vertical dashed line from curve intersection to x-axis -->
  <line x1="190" y1="152" x2="190" y2="200" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- 露点 label -->
  <text x="190" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#EF4444">露点</text>
  <text x="190" y="213" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#EF4444">14°C</text>

  <!-- Saturation point on curve at 20°C -->
  <!-- 20°C, 17.3g => y=200-17.3*4=130.8 -->
  <circle cx="242" cy="130.8" r="3" fill="#3B82F6"/>
  <text x="253" y="127" font-family="sans-serif" font-size="8" fill="#3B82F6">飽和 17.3g/m³</text>

  <!-- Bracket between actual and saturation -->
  <line x1="248" y1="132" x2="248" y2="150" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="246" y1="132" x2="250" y2="132" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="246" y1="150" x2="250" y2="150" stroke="#F59E0B" stroke-width="1.2"/>

  <!-- Formula -->
  <rect x="95" y="228" width="250" height="17" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="220" y="240" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#374151">湿度 = 実際の水蒸気量 ÷ 飽和水蒸気量 × 100</text>
</svg>