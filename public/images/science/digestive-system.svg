<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#F5F3F0"/>
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">消化管と消化酵素</text>

  <!-- Digestive tract (left side) -->
  <text x="80" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">消化管</text>

  <!-- Mouth -->
  <rect x="50" y="58" width="60" height="22" rx="6" fill="#fca5a5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="80" y="73" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991b1b">口</text>

  <!-- Arrow -->
  <line x1="80" y1="80" x2="80" y2="90" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Esophagus -->
  <rect x="60" y="92" width="40" height="18" rx="4" fill="#fed7aa" stroke="#F59E0B" stroke-width="1"/>
  <text x="80" y="105" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">食道</text>

  <line x1="80" y1="110" x2="80" y2="118" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Stomach -->
  <ellipse cx="80" cy="140" rx="35" ry="18" fill="#fca5a5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="80" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991b1b">胃</text>

  <line x1="80" y1="158" x2="80" y2="168" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Small intestine -->
  <rect x="40" y="170" width="80" height="30" rx="10" fill="#93c5fd" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="80" y="189" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e40af">小腸</text>

  <line x1="80" y1="200" x2="80" y2="210" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Large intestine -->
  <rect x="45" y="212" width="70" height="24" rx="8" fill="#d1fae5" stroke="#10B981" stroke-width="1.5"/>
  <text x="80" y="228" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#065f46">大腸</text>

  <line x1="80" y1="236" x2="80" y2="245" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Anus -->
  <rect x="55" y="248" width="50" height="18" rx="4" fill="#e5e7eb" stroke="#6B7280" stroke-width="1"/>
  <text x="80" y="260" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">肛門</text>

  <!-- Right side: Enzymes table -->
  <text x="275" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#374151">消化酵素のはたらき</text>

  <!-- Saliva -->
  <rect x="175" y="60" width="200" height="35" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="195" y="75" font-family="sans-serif" font-size="8" font-weight="bold" fill="#92400e">だ液</text>
  <text x="195" y="87" font-family="sans-serif" font-size="7" fill="#92400e">アミラーゼ</text>
  <text x="280" y="80" font-family="sans-serif" font-size="8" fill="#374151">デンプン → 麦芽糖</text>

  <!-- Gastric juice -->
  <rect x="175" y="102" width="200" height="35" rx="6" fill="#fee2e2" stroke="#EF4444" stroke-width="1"/>
  <text x="195" y="117" font-family="sans-serif" font-size="8" font-weight="bold" fill="#991b1b">胃液</text>
  <text x="195" y="129" font-family="sans-serif" font-size="7" fill="#991b1b">ペプシン</text>
  <text x="280" y="122" font-family="sans-serif" font-size="8" fill="#374151">タンパク質 → （分解）</text>

  <!-- Pancreatic juice -->
  <rect x="175" y="144" width="200" height="50" rx="6" fill="#dbeafe" stroke="#3B82F6" stroke-width="1"/>
  <text x="195" y="159" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1e40af">すい液</text>
  <text x="195" y="171" font-family="sans-serif" font-size="7" fill="#1e40af">トリプシン</text>
  <text x="195" y="186" font-family="sans-serif" font-size="7" fill="#1e40af">リパーゼ</text>
  <text x="280" y="162" font-family="sans-serif" font-size="8" fill="#374151">タンパク質 → アミノ酸</text>
  <text x="280" y="180" font-family="sans-serif" font-size="8" fill="#374151">脂肪 → 脂肪酸+モノグリセリド</text>

  <!-- Bile -->
  <rect x="175" y="200" width="200" height="35" rx="6" fill="#d1fae5" stroke="#10B981" stroke-width="1"/>
  <text x="195" y="215" font-family="sans-serif" font-size="8" font-weight="bold" fill="#065f46">胆汁</text>
  <text x="195" y="227" font-family="sans-serif" font-size="7" fill="#065f46">肝臓で作られる</text>
  <text x="280" y="218" font-family="sans-serif" font-size="8" fill="#374151">消化酵素なし</text>
  <text x="280" y="230" font-family="sans-serif" font-size="7" fill="#6B7280">リパーゼのはたらきを助ける</text>

  <!-- Absorption -->
  <rect x="175" y="245" width="200" height="40" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="0" fill-opacity="0"/>
  <rect x="175" y="245" width="200" height="40" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="275" y="260" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#92400e">小腸の柔毛で養分を吸収</text>
  <text x="275" y="275" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">ブドウ糖・アミノ酸→毛細血管 / 脂肪→リンパ管</text>

  <defs>
    <marker id="arrowG" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
