<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <rect width="400" height="280" rx="16" fill="#F5F3F0"/>
  <text x="200" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">神経系のしくみ</text>

  <!-- Central Nervous System -->
  <rect x="140" y="40" width="120" height="120" rx="12" fill="#dbeafe" stroke="#3B82F6" stroke-width="2"/>
  <text x="200" y="58" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1e40af">中枢神経</text>

  <!-- Brain -->
  <ellipse cx="200" cy="82" rx="40" ry="18" fill="#93c5fd" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="200" y="86" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a">脳</text>
  <text x="200" y="96" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3B82F6">（判断・命令）</text>

  <!-- Spinal cord -->
  <rect x="185" y="105" width="30" height="48" rx="6" fill="#93c5fd" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="200" y="128" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1e3a8a">せきずい</text>
  <text x="200" y="148" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3B82F6">（中継）</text>

  <!-- Peripheral Nerves -->
  <!-- Sensory organs (left) -->
  <rect x="15" y="55" width="100" height="65" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="65" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#92400e">感覚器官</text>
  <text x="65" y="86" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">目・耳・鼻</text>
  <text x="65" y="98" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">皮膚・舌</text>
  <text x="65" y="112" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">（刺激を受けとる）</text>

  <!-- Sensory nerve arrow -->
  <line x1="115" y1="85" x2="140" y2="85" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmb)"/>
  <text x="128" y="78" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#F59E0B">感覚神経</text>

  <!-- Motor organs (right) -->
  <rect x="285" y="55" width="100" height="65" rx="8" fill="#d1fae5" stroke="#10B981" stroke-width="1.5"/>
  <text x="335" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#065f46">運動器官</text>
  <text x="335" y="86" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065f46">筋肉</text>
  <text x="335" y="98" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065f46">（手・足など）</text>
  <text x="335" y="112" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6B7280">（反応を起こす）</text>

  <!-- Motor nerve arrow -->
  <line x1="260" y1="85" x2="285" y2="85" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGrn)"/>
  <text x="272" y="78" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#10B981">運動神経</text>

  <!-- Conscious response path -->
  <text x="200" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">意識して起こる反応</text>
  <rect x="20" y="188" width="360" height="28" rx="6" fill="#e0e7ff" stroke="#3B82F6" stroke-width="1"/>
  <text x="200" y="206" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#1e40af">感覚器官 → 感覚神経 → せきずい → 脳 → せきずい → 運動神経 → 運動器官</text>

  <!-- Reflex path -->
  <text x="200" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#EF4444">反射（無意識の反応）</text>
  <rect x="20" y="242" width="360" height="28" rx="6" fill="#fee2e2" stroke="#EF4444" stroke-width="1"/>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#991b1b">感覚器官 → 感覚神経 → せきずい → 運動神経 → 運動器官（脳を経由しない＝速い！）</text>

  <defs>
    <marker id="arrowAmb" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#F59E0B"/>
    </marker>
    <marker id="arrowGrn" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#10B981"/>
    </marker>
  </defs>
</svg>
