<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#F59E0B" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="中学生のためのスマホ学習サイト。公式LINEから始める" />
    <meta name="robots" content="noindex,nofollow" />
    <!--
      LINE WebView は HTTP Cache-Control を無視して HTML を強くキャッシュする
      ケースがある。古い index.html がキャッシュされて Vite の hash 付き
      asset を 404 にしないよう、meta 経由でも no-store を明示する（vercel.json
      のヘッダーと二重設定。実害なし）。
    -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>チャットでスタディ｜公式LINE</title>

    <!-- Firebase 系ドメインへの接続を前倒し（DNS / TCP / TLS のハンドシェイク短縮） -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />

    <!-- LIFF SDK / LINE OAuth 系の接続を前倒し（liff.init() / getIDToken の往復短縮） -->
    <link rel="preconnect" href="https://api.line.me" crossorigin />
    <link rel="preconnect" href="https://static.line-scdn.net" crossorigin />
    <link rel="dns-prefetch" href="https://api.line.me" />
    <link rel="dns-prefetch" href="https://static.line-scdn.net" />

    <!-- createLiffFirebaseToken (Cloud Function) のホストへの preconnect -->
    <link rel="preconnect" href="https://asia-northeast1-chatstudy-63477.cloudfunctions.net" crossorigin />
    <link rel="dns-prefetch" href="https://asia-northeast1-chatstudy-63477.cloudfunctions.net" />

    <!--
      First-paint の loading 表示。JS の download / parse / React mount まで
      数秒かかる間、ユーザーに真っ白画面を見せないために HTML に直接 inline。
      React がマウントすると <div id="root"> の中身は置き換わるため自動的に消える。
    -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #FAF9F7;
        font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
        color: #6B7280;
      }
      #root { min-height: 100vh; }
      .initial-loading {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        box-sizing: border-box;
      }
      .initial-loading-dots {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .initial-loading-dot {
        width: 12px;
        height: 12px;
        background: #F59E0B;
        border-radius: 50%;
        animation: initial-loading-bounce 0.9s infinite ease-in-out;
      }
      .initial-loading-dot:nth-child(2) { animation-delay: 0.15s; }
      .initial-loading-dot:nth-child(3) { animation-delay: 0.3s; }
      .initial-loading-text {
        font-size: 14px;
        margin: 0;
      }
      @keyframes initial-loading-bounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
      }
      .initial-loading-rescue {
        display: none;
        margin-top: 24px;
        max-width: 340px;
        padding: 0 16px;
        text-align: center;
      }
      .initial-loading-rescue.show { display: block; }
      .initial-loading-rescue-title {
        font-size: 14px;
        font-weight: bold;
        color: #92400E;
        margin: 0 0 8px;
      }
      .initial-loading-rescue-body {
        font-size: 12px;
        color: #4B5563;
        line-height: 1.6;
        margin: 0 0 12px;
      }
      .initial-loading-rescue-btn {
        display: inline-block;
        padding: 10px 24px;
        background: #F59E0B;
        color: #FFFFFF;
        border: none;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      .initial-loading-rescue-btn:active { transform: scale(0.96); }
      .initial-loading-rescue-tips {
        margin-top: 12px;
        font-size: 11px;
        color: #6B7280;
        text-align: left;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading" role="status" aria-live="polite">
        <div class="initial-loading-dots" aria-hidden="true">
          <span class="initial-loading-dot"></span>
          <span class="initial-loading-dot"></span>
          <span class="initial-loading-dot"></span>
        </div>
        <p class="initial-loading-text">読み込み中...</p>
        <!--
          React が一定時間内にマウントされなかった場合（= asset hash 404 などで
          JS バンドルがロードできなかった場合）に出すレスキューパネル。
          React が正常にマウントすれば <div id="root"> の中身が React によって
          置き換わるので、このパネル自体も消える。
        -->
        <div id="initial-loading-rescue" class="initial-loading-rescue">
          <p class="initial-loading-rescue-title">⚠️ ページを開けないようです</p>
          <p class="initial-loading-rescue-body">
            キャッシュが残っている可能性があります。<br />
            LINE アプリを<b>完全に終了</b>して、もう一度開いてみてください。
          </p>
          <button
            type="button"
            class="initial-loading-rescue-btn"
            onclick="location.reload()"
          >
            ページを再読み込み
          </button>
          <div class="initial-loading-rescue-tips">
            それでも開かないとき:
            <ol style="padding-left: 20px; margin: 6px 0 0;">
              <li>画面右上の「⋮」ボタン → 「すべてのタブ」</li>
              <li>「チャットでスタディ」のタブを全て削除</li>
              <li>LINE のメニューからもう一度開き直す</li>
            </ol>
          </div>
        </div>
      </div>
    </div>
    <script>
      // React が STUCK_MS 以内に <div id="root"> を置き換えなかったら、
      // 上のレスキューパネルを表示する。Cache-Control / SW なしの dist-line/ で
      // index.html が古いままだと、参照する hash 付き JS が 404 になって
      // React がマウントできずローディングのままになる症状の救済。
      (function () {
        var STUCK_MS = 4000;
        setTimeout(function () {
          var loading = document.querySelector('.initial-loading');
          if (!loading) return; // React がマウント済みなら何もしない
          var rescue = document.getElementById('initial-loading-rescue');
          if (rescue) rescue.className = 'initial-loading-rescue show';
        }, STUCK_MS);
      })();
    </script>
    <script type="module" src="/src/main.line.tsx"></script>
  </body>
</html>
